[GLOBAL]
NatsEndpoint=127.0.0.1:4222
; The persistent JetStream name that the ingress gateway writes to
TelemetryStream=SensorStream
; The specific topic we are pulling from
TelemetrySubject=sensor.telemetry
; Where failed messages go when a destination is permanently unreachable
DlqSubjectPrefix=sensor.dlq

[INGRESS]
; ── Network Binding ──
BindPort=8443
; Expected Bearer token from the sensors (rotate frequently in production)
AuthToken=ChangeMe
; NATS Subject for raw telemetry
TelemetrySubject=sensor.telemetry
; JetStream name for persistent storage
TelemetryStream=SensorStream
; ── TLS Configuration ──
; Set to True to enable HTTPS via rustls (recommended for production).
; When False the ingress binds plain HTTP (suitable for dev/QA behind a proxy).
TlsEnabled=True
; Paths to PEM-encoded certificate chain and private key.
; Required only when TlsEnabled=True.
TlsCertPath=certs/server.pem
TlsKeyPath=certs/server-key.pem

[SPLUNK]
; Splunk HEC Endpoint (Heavy Forwarder or Indexer)
HecEndpoint=https://10.0.0.50:8088/services/collector/event
HecToken=ChangeMe
; Maximum number of events to pull from NATS and push to Splunk in one HTTP request
MaxBatchSize=500
; Maximum HTTP network timeout in seconds
TimeoutSeconds=15
; Target index/datasource
TargetIndex=sensor-alerts
TargetSourceType=sensor:ueba

[ELASTIC]
; Elastic Bulk API endpoint
Endpoint=https://elastic-cluster:9200/_bulk
ApiKey=Elastic_API_Key_Here
; Maximum events per bulk push
MaxBatchSize=1000
; The target index for the ECS-mapped data
TargetIndex=logs-sensor-alerts

[SQL]
DbHost=sql.internal.corp
DbPort=1433
DbName=DataSensor_Telemetry
; Set to True to use Windows Integrated Authentication (SSPI)
UseSspi=True
; Username/Password used only if UseSspi=False
DbUser=
DbPass=
; Enforce TLS encryption for the SQL connection (Required, Optional, or Off)
Encryption=Required
; Set to True to bypass SQL certificate chain validation (for self-signed internal certs)
TrustServerCert=True
; The stored procedure that handles the bulk JSON insert
SprocName=EXEC dbo.sp_IngestSensorTelemetry @json = @p1
MaxBatchSize=2000
; QA/TEST ONLY: When set, worker POSTs batches to this HTTP URL instead of SQL Server.
; Leave empty (or remove) in production.
TestWebhookUrl=