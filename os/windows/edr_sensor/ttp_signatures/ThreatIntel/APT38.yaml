- ttp_signature:
    name: "Lazarus AppleJeus / 3CX Supply Chain"
    severity: "Critical"
    meta:
      tactic: "Initial Access (TA0001)"
      technique: "Supply Chain Compromise (T1195.002)"
      procedure: "Lazarus compromising software supply chain (3CX, Trading Technologies)"
    match:
      actor: "**"
      type: "PROCESS_START"
      target: "3CXDesktopApp.exe"
    filter:
      exclude_path: "C:\\Program Files\\*"
      exclude_actor: "3CXDesktopApp.exe"

- ttp_signature:
    name: "Lazarus PowerShell Encoded Execution"
    severity: "Critical"
    meta:
      tactic: "Execution (TA0002)"
      technique: "Command and Scripting Interpreter: PowerShell (T1059.001)"
      procedure: "Lazarus using encoded PowerShell for execution"
    match:
      actor: "powershell.exe"
      type: "PROCESS_START"
      target: "-enc"
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "powershell.exe -enc"

