# =============================================================================
# APT10 (Stone Panda / MenuPass)
# =============================================================================

- ttp_signature:
    name: "APT10 Spearphishing with Malicious Documents"
    severity: "Critical"
    meta:
      tactic: "Initial Access (TA0001)"
      technique: "Spearphishing Attachment (T1566.001)"
      procedure: "APT10 delivering initial access via malicious Office documents"
    match:
      actor: "winword.exe"
      type: "FILE_EVENT"
      target: ".doc"
    filter:
      exclude_path: "C:\\Program Files\\*"
      exclude_actor: "winword.exe"

- ttp_signature:
    name: "APT10 PowerShell Encoded Execution"
    severity: "Critical"
    meta:
      tactic: "Execution (TA0002)"
      technique: "Command and Scripting Interpreter: PowerShell (T1059.001)"
      procedure: "APT10 using encoded PowerShell for execution"
    match:
      actor: "powershell.exe"
      type: "PROCESS_START"
      target: "-enc"
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "powershell.exe -enc"

- ttp_signature:
    name: "APT10 Living-off-the-Land Chain"
    severity: "High"
    meta:
      tactic: "Defense Evasion (TA0005)"
      technique: "Signed Binary Proxy Execution (T1218)"
      procedure: "APT10 abusing multiple LOLBins"
    match:
      actor: "**"
      type: "PROCESS_START"
      target: "rundll32.exe"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor_cmd: "rundll32.exe"

- ttp_signature:
    name: "APT10 Registry Run Key Persistence"
    severity: "High"
    meta:
      tactic: "Persistence (TA0003)"
      technique: "Boot or Logon Autostart Execution: Registry Run Keys (T1547.001)"
      procedure: "APT10 maintaining persistence via Run/RunOnce keys using LotL or dropped binaries"
    match:
      actor: "**"
      type: "REGISTRY_EVENT"
      target: "*\\Microsoft\\Windows\\CurrentVersion\\Run*"
    filter:
      exclude_target_value:
        - "*Microsoft\\Teams\\*"
        - "*OneDrive.exe*"
        - "*LastRunVersion*"
        - "*FeatureTimestampOfLatestRun*"
      exclude_path:
        - "C:\\Program Files\\*"
        - "C:\\Program Files (x86)\\*"
      exclude_actor:
        - "services.exe"
        - "lsass.exe"
        - "SearchIndexer.exe"

- ttp_signature:
    name: "APT10 WMI Lateral Movement"
    severity: "High"
    meta:
      tactic: "Lateral Movement (TA0008)"
      technique: "Windows Management Instrumentation (T1047)"
      procedure: "APT10 using WMI for lateral movement"
    match:
      actor: "wmic.exe"
      type: "PROCESS_START"
      target: "/node:"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor_cmd: "wmic.exe /node:"