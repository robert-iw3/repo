    match:
      actor: "taskhostw.exe"
      type: "MODULE_LOAD"
      target: "sbiedll.dll"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor: "services.exe"

- ttp_signature:
    name: "APT41 SilverFox Encoded Command Execution"
    severity: "Critical"
    meta:
      tactic: "Execution (TA0002)"
      technique: "Command and Scripting Interpreter: PowerShell (T1059.001)"
