- ttp_signature:
    name: "Salt Typhoon Ivanti VPN Exploitation"
    severity: "Critical"
    meta:
      tactic: "Initial Access (TA0001)"
      technique: "Exploit Public-Facing Application (T1190)"
      procedure: "Exploitation of Ivanti Connect Secure / Pulse Secure VPN"
    match:
      actor: "**"
      type: "PROCESS_START"
      target: "dsagent.exe"
    filter:
      exclude_path: "C:\\Program Files\\*"
      exclude_actor: "dsagent.exe"

- ttp_signature:
    name: "Salt Typhoon Living-off-the-Land Chain"
    severity: "High"
    meta:
      tactic: "Defense Evasion (TA0005)"
      technique: "Signed Binary Proxy Execution (T1218)"
      procedure: "Salt Typhoon using multiple LOLBins (certutil, mshta, rundll32)"
    match:
      actor: "certutil.exe"
      type: "PROCESS_START"
      target:
        - "-urlcache"
        - "-split"
        - "-decode"
    filter:
      exclude_path: "C:\\Windows\\System32\\"

- ttp_signature:
    name: "Salt Typhoon PowerShell Execution"
    severity: "High"
    meta:
      tactic: "Execution (TA0002)"
      technique: "Command and Scripting Interpreter: PowerShell (T1059.001)"
      procedure: "PowerShell used for post-exploitation"
    match:
      actor: "powershell.exe"
      type: "PROCESS_START"
      target: ""
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "powershell.exe -enc"

- ttp_signature:
    name: "Salt Typhoon Persistence via Scheduled Task"
    severity: "High"
    meta:
      tactic: "Persistence (TA0003)"
      technique: "Scheduled Task/Job (T1053)"
      procedure: "Creating scheduled tasks for persistence"
    match:
      actor: "schtasks.exe"
      type: "PROCESS_START"
      target: "/create"
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "schtasks.exe /create"

- ttp_signature:
    name: "Salt Typhoon Certutil Encoded Payload"
    severity: "High"
    meta:
      tactic: "Defense Evasion (TA0005)"
      technique: "Signed Binary Proxy Execution (T1218)"
      procedure: "Salt Typhoon using certutil with encoded payload"
    match:
      actor: "certutil.exe"
      type: "PROCESS_START"
      target: "-decode"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor_cmd: "certutil.exe -decode"