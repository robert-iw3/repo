# =============================================================================
# Andariel
# =============================================================================

- ttp_signature:
    name: "Andariel Spearphishing with Malicious Documents"
    severity: "Critical"
    meta:
      tactic: "Initial Access (TA0001)"
      technique: "Spearphishing Attachment (T1566.001)"
      procedure: "Andariel delivering initial access via malicious Office documents"
    match:
      actor: "winword.exe"
      type: "FILE_EVENT"
      target:
        - "*.vbs"
        - "*.ps1"
        - "*.exe"
        - "*.dll"
        - "*.js"
    filter:
      exclude_path:
        - "C:\\Users\\*\\AppData\\Local\\Microsoft\\Office\\*"
        - "C:\\Program Files\\*"

- ttp_signature:
    name: "Andariel PowerShell Encoded Execution"
    severity: "Critical"
    meta:
      tactic: "Execution (TA0002)"
      technique: "Command and Scripting Interpreter: PowerShell (T1059.001)"
      procedure: "Andariel using encoded PowerShell for execution"
    match:
      actor: "powershell.exe"
      type: "PROCESS_START"
      target: "-enc"
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "powershell.exe -enc"

- ttp_signature:
    name: "Andariel Living-off-the-Land Chain"
    severity: "High"
    meta:
      tactic: "Defense Evasion (TA0005)"
      technique: "Signed Binary Proxy Execution (T1218)"
      procedure: "Andariel abusing multiple LOLBins"
    match:
      actor: "**"
      type: "PROCESS_START"
      target: "rundll32.exe"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor_cmd: "rundll32.exe"

- ttp_signature:
    name: "Andariel Registry Run Key Persistence"
    severity: "Critical"
    meta:
      tactic: "Persistence (TA0003)"
      technique: "Boot or Logon Autostart Execution: Registry Run Keys (T1547.001)"
      procedure: "Andariel maintaining persistence via Run key"
    match:
      actor: "**"
      type: "REGISTRY_EVENT"
      target: "\\CurrentVersion\\Run"
    filter:
      exclude_path:
        - "C:\\Windows\\*"

- ttp_signature:
    name: "Andariel WMI Lateral Movement"
    severity: "High"
    meta:
      tactic: "Lateral Movement (TA0008)"
      technique: "Windows Management Instrumentation (T1047)"
      procedure: "Andariel using WMI for lateral movement"
    match:
      actor: "wmic.exe"
      type: "PROCESS_START"
      target: "/node:"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor_cmd: "wmic.exe /node:"