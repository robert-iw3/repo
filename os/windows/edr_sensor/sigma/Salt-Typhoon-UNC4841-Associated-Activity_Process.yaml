title: Salt Typhoon & UNC4841 - Browser Credential Harvesting
id: salt-typhoon-unc4841-cred-harvest
status: experimental
description: Detects command-line attempts to access web browser credential databases, a technique associated with Salt Typhoon and UNC4841.
author: RW
date: 2025-09-09
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: process_creation
  product: windows
detection:
  cred_harvest:
    CommandLine|contains:
      - 'Login Data'
      - 'Web Data'
      - 'Cookies'
      - 'key4.db'
      - 'logins.json'
    CommandLine|contains|any:
      - 'AppData\Local\Google'
      - 'AppData\Roaming\Mozilla'
      - 'AppData\Local\Microsoft\Edge'
      - 'AppData\Local\BraveSoftware'
  cred_harvest_filter_known_browsers:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
      - '\opera.exe'
      - '\vivaldi.exe'
  condition: cred_harvest and not cred_harvest_filter_known_browsers
level: high