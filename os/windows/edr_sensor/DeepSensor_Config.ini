# ==============================================================================
# DEEP VISIBILITY SENSOR - MASTER CONFIGURATION [UNIVERSAL BASELINE]
# ==============================================================================

[ProcessExclusions]
# ==============================================================================
# 1. BenignADSProcs - Processes that are extremely noisy but almost never malicious
#    These are excluded from deep memory scanning, YARA, and most ETW hooks.
# ==============================================================================
BenignADSProcs = msedge.exe, chrome.exe, onedrive.exe, msedgewebview2.exe, Teams.exe, Outlook.exe,
                 SearchApp.exe, ctfmon.exe, backgroundtaskhost.exe, update.exe

# ==============================================================================
# 2. TrustedNoise - System processes that generate tons of legitimate activity
#    These are excluded from Sigma matching and many kernel-level alerts.
# ==============================================================================
TrustedNoise = sysmon64.exe, aggregatorhost.exe, Code.exe, CodeHelper.exe, devenv.exe,
               microsoft.visualstudio.code.*, idea64.exe, pycharm64.exe

# ==============================================================================
# 3. ExtraBenignLineages - Parent → Child process pairs that are almost always benign
# ==============================================================================
ExtraBenignLineages = code.exe|powershell.exe, devenv.exe|powershell.exe, idea64.exe|powershell.exe,
                      code.exe|cmd.exe, devenv.exe|cmd.exe, msedge.exe|powershell.exe,
                      wbengine.exe|vssadmin.exe

# ==============================================================================
# 4. ExtraSuppressedRules - Sigma rule titles (or parts of titles) you want globally ignored
# ==============================================================================
ExtraSuppressedRules = PresentationHost, XBAP, Double Extension, Suspicious Double Extension,
                       PowerShell Downgrade Attack, Suspicious WMI Event Consumer

[RegistryExclusions]
# ==============================================================================
# BenignExplorerValues - Registry values that explorer.exe writes constantly during normal use
# ==============================================================================
BenignExplorerValues = Zvpebfsbgg.Jvaqbjf.Rkcybere, HRZR_PGYFRFFVBA, IdleInWorkingState,
                       WritePermissionsCheck, GlobalUserStartTime, ThumbnailCache,
                       ShellState, BagMRU, LastVisitedPidlMRU, UserAssist