# ==============================================================================
# DEEP VISIBILITY SENSOR - MASTER CONFIGURATION [UNIVERSAL BASELINE]
# ==============================================================================

[ENGINE]
# ==============================================================================
# Sigma / UEBA Evaluation Queue Bounding
# Controls the maximum number of pending AST evaluations before the sensor
# enters "fail-open" mode (dropping Sigma evaluations to protect the OS kernel).
#
# SIZING GUIDELINES:
# - 20000  : Standard Workstations & lightly loaded servers (~30MB RAM overhead).
# - 50000  : Active Domain Controllers & File Servers (~75MB RAM overhead).
# - 250000 : High I/O boundaries (SQL Server, IIS, Load Balancers) (~375MB RAM).
# ==============================================================================
MaxSigmaQueueSize = 20000

[TRANSMISSION]
EnableSync=True
MiddlewareEndpoint=https://127.0.0.1:8443/api/v1/telemetry
AuthToken=ChangeMe
; Identifies this stream to the Universal Gateway
SensorType=deepsensor
; How often the async worker wakes up to push micro-batches (in milliseconds)
BatchIntervalMs=500
MaxBatchSize=1000
; Auto-Recovery tuning
MaxRetries=7
BaseRetryDelayMs=2000
; Accept self-signed TLS certs from the middleware (set False for production CA-signed certs)
TrustSelfSignedCert=True

[ProcessExclusions]
# ==============================================================================
# 1. BenignADSProcs - Processes that are extremely noisy but almost never malicious
#    These are excluded from deep memory scanning, YARA, and most ETW hooks.
# ==============================================================================
BenignADSProcs = msedge.exe, chrome.exe, onedrive.exe, msedgewebview2.exe, Teams.exe, Outlook.exe,
                 SearchApp.exe, ctfmon.exe, backgroundtaskhost.exe, update.exe

# ==============================================================================
# 2. TrustedNoise - System processes that generate tons of legitimate activity
#    These are excluded from Sigma matching and many kernel-level alerts.
# ==============================================================================
TrustedNoise = sysmon64.exe, aggregatorhost.exe, Code.exe, CodeHelper.exe, devenv.exe,
               microsoft.visualstudio.code.*, idea64.exe, pycharm64.exe

# ==============================================================================
# 3. ExtraBenignLineages - Parent → Child process pairs that are almost always benign
# ==============================================================================
ExtraBenignLineages = code.exe|powershell.exe, devenv.exe|powershell.exe, idea64.exe|powershell.exe,
                      code.exe|cmd.exe, devenv.exe|cmd.exe, msedge.exe|powershell.exe,
                      wbengine.exe|vssadmin.exe

# ==============================================================================
# 4. ExtraSuppressedRules - Sigma rule titles (or parts of titles) you want globally ignored
# ==============================================================================
ExtraSuppressedRules = PresentationHost, XBAP, Double Extension, Suspicious Double Extension,
                       PowerShell Downgrade Attack, Suspicious WMI Event Consumer

# ==============================================================================
# 5. CriticalSystemProcesses - ANTI-BSOD list. Active-defense actions
#    (SuspendThread, VirtualProtectEx) are unconditionally suppressed for these.
#    These names are ADDED to the hardcoded default set; you cannot remove
#    the defaults via config -- this is intentional safety policy. To extend
#    the list (e.g. for SCADA HMI processes that must never be touched), add
#    them here.
# ==============================================================================
CriticalSystemProcesses =

# ==============================================================================
# 6. JitRuntimeProcesses - processes that legitimately allocate RWX memory
#    (JIT runtimes: V8, CLR, JVM). Forensic dump still occurs on YARA hit, but
#    page-protection flips and thread freezes are suppressed -- those would
#    crash the target. ADDED to hardcoded defaults; cannot remove defaults.
# ==============================================================================
JitRuntimeProcesses =

[RegistryExclusions]
# ==============================================================================
# BenignExplorerValues - Registry values that explorer.exe writes constantly during normal use
# ==============================================================================
BenignExplorerValues = Zvpebfbsg.Jvaqbjf.Rkcybere, HRZR_PGYFRFFVBA, IdleInWorkingState,
                       WritePermissionsCheck, GlobalUserStartTime, ThumbnailCache,
                       ShellState, BagMRU, LastVisitedPidlMRU, UserAssist

[ArmedMode]
# ==============================================================================
# Armed-mode response tiering. Every alert is scored 0-100; tier thresholds
# decide which active-defense actions fire. LOWER thresholds = MORE aggressive.
# Score inputs: rule severity, process trust, lineage trust, YARA hit, recent-
# actor frequency. Trusted-process and benign-lineage matches subtract from
# score, so legitimate dev tools stay below action thresholds even when noisy
# Sigma rules match.
# ==============================================================================
; Tier 1 (Alert-only) is everything at or above this score.
Tier1Threshold = 40
; Tier 2 (Investigate: YARA scan + minidump) at or above this score.
Tier2Threshold = 70
; Tier 3 (Respond: quarantine + thread freeze) at or above this score.
; Default 90 -- only TTP+YARA-confirmed events with untrusted actors.
Tier3Threshold = 90

; Rule-severity contribution to score. Adjust if your Sigma corpus uses
; different severity vocabulary. Comma-delimited key=value pairs.
SeverityWeights = critical=100, high=70, medium=40, low=15, informational=0

; Process-trust contributions (added to score; negative = pushes toward Tier 0).
; BenignADSProcs and TrustedNoise from [ProcessExclusions] are reused here --
; this just sets the score delta, not a separate list.
TrustBenignDelta  = -100
TrustTrustedDelta = -60
TrustUnknownDelta = 0
TrustHostileDelta = 50

; Lineage-trust contribution (when parent|child matches ExtraBenignLineages).
LineageBenignDelta = -80

; YARA-hit contribution (added when YARA worker confirms).
YaraHitDelta = 100

; Repeat-actor escalation. Score adds this much per recent-alert in the
; 5-minute bucket beyond the first. Cap at MaxRepeatAlerts.
RepeatActorPerAlertDelta = 15
MaxRepeatAlertsConsidered = 6