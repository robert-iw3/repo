[GLOBAL]
SensorMode=Monitoring
MaxInspectionSizeMB=150
; If true, logs all file movement to the SQLite WAL, regardless of DLP matches
EnableUniversalLedger=True

[UEBA_THRESHOLDS]
; Minimum bytes transferred to a unique destination before establishing a baseline
BaselineMinSamples=15
; Z-Score deviation required to trigger an Anomaly Alert (e.g., 3.0 = 99.7% percentile)
ZScoreTrigger=3.0
; Confidence threshold to enact Active Defense (isolate process/network)
MitigationConfidence=95

[FILE_INSPECTION]
; Extensions that require decompression/parsing before regex evaluation
ArchiveTypes=.zip,.7z,.tar,.gz,.rar
DocumentTypes=.pdf,.docx,.xlsx,.pptx,.rtf
TextTypes=.txt,.csv,.json,.xml,.ps1,.cs,.rs,.py,.yaml

[DLP_REGEX]
; Standard PII & Financial
US_SSN=\b\d{3}-\d{2}-\d{4}\b
CreditCard=\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13})\b
IPv4_Internal=\b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})\b

; Secrets & Cloud Infrastructure
AWSAccessKey=AKIA[0-9A-Z]{16}
PrivateRSAKey=-----BEGIN RSA PRIVATE KEY-----
JSONWebToken=ey[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*
CryptoWallet=(?:0x[a-fA-F0-9]{40}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})

[DLP_LITERALS]
; Highly sensitive internal project codenames and Windows credential artifacts
ProjectNames=Project Titan,Project Olympus,Operation Chimera,Looking Glass
Classifications=CONFIDENTIAL,RESTRICTED,PROPRIETARY,INTERNAL ONLY,DO NOT DISTRIBUTE
WindowsArtifacts=NTDS.DIT,SAM.SAVE,SYSTEM.SAVE

[EXCLUSIONS]
TrustedDomains=microsoft.com,windows.com,update.local,office.com
; Core Windows subsystems that generate massive I/O and should never be injected
TrustedProcesses=svchost.exe,msmpeng.exe,csrss.exe,lsass.exe,smss.exe,winlogon.exe,explorer.exe,searchindexer.exe,vctip.exe,link.exe,cl.exe,rust-analyzer.exe,cargo.exe,rustc.exe