# =============================================================================
# Volt Typhoon (UNC757 / Bronze Silhouette)
# =============================================================================

- ttp_signature:
    name: "Volt Typhoon Webshell Execution from IIS"
    severity: "Critical"
    meta:
      tactic: "Persistence (TA0003)"
      technique: "Server Software Component: Web Shell (T1505.003)"
      procedure: "w3wp.exe spawning cmd.exe or powershell.exe for reconnaissance"
    match:
      actor: "w3wp.exe"
      type: "PROCESS_START"
      target: "cmd.exe"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor: "w3wp.exe"

- ttp_signature:
    name: "Volt Typhoon Living-off-the-Land Chain"
    severity: "High"
    meta:
      tactic: "Defense Evasion (TA0005)"
      technique: "Signed Binary Proxy Execution (T1218)"
      procedure: "Volt Typhoon using multiple LOLBins (certutil, mshta, rundll32)"
    match:
      actor: "certutil.exe"
      type: "PROCESS_START"
      target:
        - "-urlcache"
        - "-split"
        - "-decode"
    filter:
      exclude_path: "C:\\Windows\\System32\\"

- ttp_signature:
    name: "Volt Typhoon PowerShell Reconnaissance"
    severity: "High"
    meta:
      tactic: "Discovery (TA0007)"
      technique: "Command and Scripting Interpreter: PowerShell (T1059.001)"
      procedure: "Volt Typhoon using PowerShell for system reconnaissance"
    match:
      actor: "powershell.exe"
      type: "PROCESS_START"
      target: "whoami"
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "powershell.exe"

