      tactic: "Initial Access (TA0001)"
      technique: "User Execution: Malicious File (T1204.002)"
      procedure: "rundll32.exe executing malicious DLL from UNC network share (ClickFix)"
    match:
      actor: "rundll32.exe"
      type: "PROCESS_START"
      target: "\\\\"
    filter:
      exclude_path: "C:\\Windows\\*"
      exclude_actor_cmd: "rundll32.exe"

