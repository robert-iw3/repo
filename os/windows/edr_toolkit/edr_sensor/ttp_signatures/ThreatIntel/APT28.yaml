# =============================================================================
# APT28 (Fancy Bear / Cozy Bear) - High-Fidelity TTP Signatures
# =============================================================================

- ttp_signature:
    name: "APT28 Covenant Loader Drop"
    severity: "Critical"
    meta:
      tactic: "Initial Access (TA0001)"
      technique: "Spearphishing Attachment (T1566.001)"
      procedure: "WinWord dropping ctec.dll decryption loader"
    match:
      actor: "winword.exe"
      type: "FILE_EVENT"
      target:
        - "*.vbs"
        - "*.ps1"
        - "*.exe"
        - "*.dll"
        - "*.js"
    filter:
      exclude_path:
        - "C:\\Users\\*\\AppData\\Local\\Microsoft\\Office\\*"
        - "C:\\Program Files\\*"

- ttp_signature:
    name: "APT28 COM Hijacking via Registry"
    severity: "High"
    meta:
      tactic: "Persistence (TA0003)"
      technique: "Component Object Model Hijacking (T1546.015)"
      procedure: "Modifying InprocServer32 for Shell Extension persistence"
    match:
      actor: "**"
      type: "REGISTRY_EVENT"
      target: "*\\CLSID\\{2227A280-3AEA-1069-A2DE-08002B30309D}\\InprocServer32*"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor:
        - "services.exe"
        - "msiexec.exe"

- ttp_signature:
    name: "APT28 BeardShell Sideloading"
    severity: "Critical"
    meta:
      tactic: "Persistence (TA0003)"
      technique: "DLL Side-Loading (T1574.002)"
      procedure: "Covenant loader sideloading via BeardShell.dll"
    match:
      actor: "winword.exe"
      type: "MODULE_LOAD"
      target: "BeardShell.dll"
    filter:
      exclude_path: "C:\\Windows\\System32\\*"
      exclude_actor: "winword.exe"

