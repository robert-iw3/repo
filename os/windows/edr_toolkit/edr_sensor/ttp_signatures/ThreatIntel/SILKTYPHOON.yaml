- ttp_signature:
    name: "Silk Typhoon BRICKSTORM Backdoor Staging"
    severity: "Critical"
    meta:
      tactic: "Command and Control (TA0011)"
      technique: "Proxy: Multi-hop Proxy (T1090.003)"
      procedure: "Execution of the Go-based BRICKSTORM backdoor for stealthy SOCKS5 proxying"
    match:
      actor: "**"
      type: "PROCESS_START"
      target: "brickstorm"
    filter:
      exclude_path:
        - "C:\\Windows\\*"

