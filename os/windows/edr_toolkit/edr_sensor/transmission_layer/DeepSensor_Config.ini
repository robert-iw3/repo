[Telemetry]
# Central Consolidation Layer Endpoint
SiemUrl=https://central-consolidation.internal:8443/api/v1/telemetry

# Authentication Mode: Choose 'mTLS', 'Token', or 'None'
AuthMode=mTLS

# Used if AuthMode=mTLS (Stored in LocalMachine\My)
CertThumbprint=A1B2C3D4E5F678901234567890ABCDEF12345678

# Used if AuthMode=Token
BearerToken=

# Maximum events to hold before forced transmission
BatchSize=250
# Maximum seconds to wait before transmitting an incomplete batch
FlushIntervalSeconds=5