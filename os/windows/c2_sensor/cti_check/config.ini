# ===================================================================================
# Script Name: config.ini
# Description: Centralized configuration file for the C2 Hunter V5 toolset.
#              Securely stores API keys for Threat Intelligence (CTI) enrichment
#              and defines standard file paths for the telemetry pipeline.
#              Keeping API keys here prevents them from being hardcoded into
#              scripts, reducing the risk of accidental exposure in version control.
# Integration: Designed to support Windows Kernel C2 Beacon Hunter v5.0 outputs.
# ===================================================================================

[API_KEYS]
VIRUSTOTAL_KEY=""
ALIENVAULT_OTX_KEY=""
ABUSEIPDB_KEY=""

[PATHS]
# The directory where the CTI Engine will save the timestamped behavioral reports.
OUTPUT_DIR="$PWD"