[NetworkExclusions]
# ==============================================================================
# ENVIRONMENT TUNING GUIDE (DNS & IPs)
# ==============================================================================
# 1. HOME / LAB NETWORK (Current Baseline): Leave all exclusions active. This
#    filters out high-noise streaming, consumer telemetry, and gaming.
# 2. BUSINESS / CORPORATE: Remove consumer CDNs (youtube, discord, spotify, brave).
#    Keep Enterprise SaaS (Office365, Slack, Webex) and Enterprise AV.
# 3. RESTRICTED ENCLAVE (Air-Gapped/Zero-Trust): DELETE all cloud and internet exclusions.
#    Only permit internal routing (.corp, .local). In an enclave, ANY outbound
#    connection to Azure, AWS, or GCP should immediately trigger a ML Alert.
# ==============================================================================

# --- DNS EXCLUSION CATEGORIES ---
# DEVELOPER NOTE: Suffix matching. ".windows.com" will safely drop "telemetry.windows.com"
#
# [Internal Routing]   : .arpa, .local, .lan, .home, .corp
# [Microsoft Core]     : microsoft.com, windows.com, windowsupdate.com, azure.com, azureedge.net, azurefd.net, trafficmanager.net, live.com, office.com, office365.com, skype.com, msn.com, bing.com, visualstudio.com, microsoftonline.com, sharepoint.com, msedge.net, msauth.net, msftauth.net, applicationinsights.io, windows.net
# [Google Ecosystem]   : google.com, googleapis.com, 1e100.net, gstatic.com, gvt1.com, gvt2.com, youtube.com, ytimg.com, googlevideo.com
# [Major CDNs & Cloud] : amazonaws.com, cloudfront.net, cloudflare.com, cloudflare.net, fastly.net, akadns.net, akamaized.net, akamaiedge.net, msocdn.com
# [Apple Ecosystem]    : apple.com, icloud.com, mzstatic.com
# [Dev & Telemetry]    : github.com, githubusercontent.com, sentry.io, vscode.dev, vsassets.io, adobe.com, acrobat.com
# [PKI & Certificates] : digicert.com, symcb.com, sectigo.com, crl.com, ocsp.com, lencr.org, pki.goog
# [Unified Comms]      : zoom.us, webex.com, slack-edge.com, discord.gg, discordapp.com, whatsapp.net
# [Enterprise AV]      : trendmicro.com, tmok.tm, mcafee.com, trellix.com, symantec.com, sophos.com, crowdstrike.com
#
# ACTIVE DNS EXCLUSION STRING:
DnsExclusions = .arpa, .local, .lan, .home, .corp, microsoft.com, windows.com, windowsupdate.com, azure.com, azureedge.net, azurefd.net, trafficmanager.net, live.com, office.com, office365.com, skype.com, msn.com, bing.com, visualstudio.com, microsoftonline.com, sharepoint.com, msedge.net, msauth.net, msftauth.net, applicationinsights.io, windows.net, akadns.net, akamaized.net, akamaiedge.net, msocdn.com, google.com, googleapis.com, 1e100.net, gstatic.com, gvt1.com, gvt2.com, youtube.com, ytimg.com, googlevideo.com, amazonaws.com, cloudfront.net, cloudflare.com, cloudflare.net, fastly.net, apple.com, icloud.com, mzstatic.com, github.com, githubusercontent.com, sentry.io, vscode.dev, vsassets.io, adobe.com, acrobat.com, digicert.com, symcb.com, sectigo.com, crl.com, ocsp.com, lencr.org, pki.goog, zoom.us, webex.com, slack-edge.com, discord.gg, discordapp.com, whatsapp.net, trendmicro.com, tmok.tm, mcafee.com, trellix.com, symantec.com, sophos.com, crowdstrike.com


# --- IPv4 EXCLUSION CATEGORIES ---
# DEVELOPER NOTE: Strict Regex required. Anchor with ^ (start) and $ (end) or \. for subnets.
#
# [Local/Loopback]     : ^127\.
# [Multicast/Class E]  : ^2(?:2[4-9]|3[0-9])\., ^2[4-5][0-9]\.
# [Subnet Broadcast]   : \.255$
# [Trusted Upstream]   : ^1\.1\.1\.1$, ^1\.0\.0\.1$, ^8\.8\.8\.8$, ^8\.8\.4\.4$, ^9\.9\.9\.9$
# [Azure Core Telemetry]: ^52\., ^13\., ^20\., ^23\.
# [Google CDN Ranges]  : ^142\.25[0-9]\., ^74\.125\.
# [Active Test Infra]  : ^18\.214\.245\., ^104\.20\.23\.
#
# ACTIVE IP EXCLUSION STRING:
IpExclusions = ^52\., ^142\.25[0-9]\., ^13\., ^20\., ^23\., ^74\.125\., ^127\., ^2(?:2[4-9]|3[0-9])\., ^2[4-5][0-9]\., ^1\.1\.1\.1$, ^1\.0\.0\.1$, ^8\.8\.8\.8$, ^8\.8\.4\.4$, ^9\.9\.9\.9$, \.255$, ^18\.214\.245\., ^104\.20\.23\.


[ProcessExclusions]
# ==============================================================================
# ENVIRONMENT TUNING GUIDE (PROCESSES)
# ==============================================================================
# WARNING: NEVER add "svchost", "explorer", "powershell", or "lsass" to this list.
# Advanced C2 beacons (like Cobalt Strike) specifically migrate into these processes.
# If deploying to a server, aggressively strip desktop UI components and browsers.
# ==============================================================================

# --- PROCESS EXCLUSION CATEGORIES ---
# [Browsers]         : chrome, msedge, msedgewebview2, firefox, brave, opera, iexplore
# [Comms/Media]      : spotify, teams, discord, slack, zoom, webex, whatsapp
# [Cloud Sync]       : onedrive, dropbox, googledrivesync
# [OS UI Components] : startmenuexperiencehost, shellexperiencehost, backgroundtaskhost, dwm, searchapp, searchui, dashost, coreserviceshell
# [OS Telemetry]     : googleupdate, mousocoreworker, tiworker, compattelrunner, fontdrvhost
# [Security/AV]      : msmpeng, nissrv, securityhealthservice, smartscreen
#
# ACTIVE PROCESS EXCLUSION STRING:
ProcessExclusions = chrome, msedge, msedgewebview2, firefox, brave, opera, iexplore, spotify, teams, discord, slack, zoom, webex, whatsapp, onedrive, dropbox, googledrivesync, googleupdate, mousocoreworker, tiworker, searchapp, searchui, startmenuexperiencehost, shellexperiencehost, backgroundtaskhost, compattelrunner, fontdrvhost, dwm, dashost, coreserviceshell, msmpeng, nissrv, securityhealthservice, smartscreen


[AppGuardDefinitions]
# ==============================================================================
# UNIVERSAL SERVER-SIDE APPLICATION DEFENSE (AppGuard)
# ==============================================================================
# Defines the specific daemons running on the host. If ANY of these daemons
# spawn one of the ShellInterpreters listed below, the sensor will instantly
# trigger a Local Privilege Escalation alert (Webshell / RCE detected).
# ==============================================================================

# [Web Server Daemons]
WebDaemons = w3wp, iisexpress, httpd, nginx, lighttpd, caddy, traefik, envoy, haproxy, tomcat, tomcat7, tomcat8, tomcat9, java, javaw, node, dotnet, python, python3, php, php-cgi, ruby

# [Database Daemons]
DbDaemons = sqlservr, mysqld, mariadbd, postgres, oracle, tnslsnr, db2sysc, fbserver, mongod, redis-server, memcached, couchdb, influxd, arangod

# [Restricted Interpreters & Binaries]
# These binaries should NEVER be executed as child processes of Web or DB daemons.
ShellInterpreters = cmd, powershell, pwsh, wscript, cscript, bash, sh, whoami, csc, cvtres, certutil, wmic, rundll32, regsvr32, msbuild, bitsadmin


[SuspiciousPaths]
# ==============================================================================
# FILE SYSTEM HEURISTICS
# ==============================================================================
# Triggers high-confidence alerts if unexpected executables run from these directories.
# ==============================================================================

SuspiciousPaths = \temp\, \programdata\, \inetpub\wwwroot\, \appdata\, \users\public\