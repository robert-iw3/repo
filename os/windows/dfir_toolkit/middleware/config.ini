[DEFAULT]
AUTH_TOKEN = SuperSecretBearerToken123
ACTIVE_SIEM = SPLUNK
BATCH_SIZE = 500
THROTTLE_SLEEP = 0.25

[SPLUNK]
HEC_URL = https://splunk-heavy-forwarder.local:8088/services/collector/event
HEC_TOKEN = YOUR_SPLUNK_HEC_TOKEN

[ELASTIC]
URL = https://your-elastic-node:9200/dfir-collections/_bulk
API_KEY = YOUR_BASE64_ENCODED_API_KEY

[SENTINEL]
WORKSPACE_ID = YOUR_WORKSPACE_ID
SHARED_KEY = YOUR_PRIMARY_KEY
LOG_TYPE = EndpointDFIR_CL

[DATADOG]
API_KEY = YOUR_DATADOG_API_KEY
URL = https://http-intake.logs.datadoghq.com/api/v2/logs

[SYSLOG]
SERVER = 192.168.1.100
PORT = 514
PROTOCOL = UDP