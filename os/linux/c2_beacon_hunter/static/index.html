<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Hunter | NEURAL LINK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Cyberpunk Customizations */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap');
        body { font-family: 'Fira Code', monospace; background-color: #050505; color: #e2e8f0; }
        .neon-border-cyan { box-shadow: 0 0 10px rgba(6, 182, 212, 0.5); border: 1px solid #06b6d4; }
        .neon-border-pink { box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); border: 1px solid #ec4899; }
        .neon-text-cyan { text-shadow: 0 0 5px rgba(6, 182, 212, 0.8); }
        .neon-text-pink { text-shadow: 0 0 5px rgba(236, 72, 153, 0.8); }
        .grid-bg {
            background-image: linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="grid-bg min-h-screen p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center border-b border-cyan-800 pb-4 mb-6">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400 neon-text-cyan tracking-widest">C2_HUNTER_SYS</h1>
                <p class="text-xs text-pink-500 mt-1 uppercase tracking-widest">// V2.8 ACTIVE DEFENSE ENCLAVE</p>
            </div>
            <div class="text-xs bg-black px-3 py-1 rounded-sm border border-cyan-800 text-cyan-500" id="status-indicator">
                [ OFFLINE_LINK ]
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-black/60 p-5 rounded-sm neon-border-cyan">
                <h2 class="text-lg font-bold mb-4 border-b border-cyan-800 pb-2 text-cyan-300 uppercase tracking-wide">UEBA Telemetry</h2>
                <div id="metrics-content" class="text-sm text-gray-300 space-y-2">Establishing uplink...</div>
            </div>

            <div class="bg-black/60 p-5 rounded-sm neon-border-cyan md:col-span-2">
                <h2 class="text-lg font-bold mb-4 border-b border-cyan-800 pb-2 text-cyan-300 uppercase tracking-wide">Live Process Trees</h2>
                <div id="process-content" class="text-xs text-gray-400 bg-gray-900/80 p-3 rounded-sm h-32 overflow-y-auto border border-gray-800">
                    Awaiting anomaly sequence...
                </div>
            </div>
        </div>

        <div class="bg-black/80 p-5 rounded-sm neon-border-pink mb-6">
            <div class="flex justify-between items-center border-b border-pink-900 pb-2 mb-4">
                <h2 class="text-lg font-bold text-pink-500 neon-text-pink uppercase tracking-wide">External Threat Intel (CTI)</h2>
                <span id="cti-filename" class="text-xs text-pink-700"></span>
            </div>
            <pre id="cti-content" class="text-xs text-green-400 bg-black p-4 rounded-sm h-48 overflow-y-auto border border-gray-800">
Querying DFIR databanks...
            </pre>
        </div>

        <div class="bg-black/60 p-5 rounded-sm border border-cyan-900">
            <h2 class="text-lg font-bold mb-4 border-b border-cyan-800 pb-2 text-cyan-300 uppercase tracking-wide">Active Detections</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="text-cyan-700 bg-black border-b border-cyan-900 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-3">SYS_TIME</th>
                            <th class="p-3">PROCESS_ID</th>
                            <th class="p-3">REMOTE_VECTOR</th>
                            <th class="p-3">TTP_MAP</th>
                            <th class="p-3">THREAT_LVL</th>
                        </tr>
                    </thead>
                    <tbody id="anomalies-table" class="divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                // Metrics Fetch
                const metricsRes = await fetch('/api/v1/metrics');
                const metricsData = await metricsRes.json();

                if (metricsData.total_flows_tracked !== undefined) {
                    const status = document.getElementById('status-indicator');
                    status.innerHTML = '[ UPLINK_SECURE : HTTPS ]';
                    status.className = 'text-xs bg-black px-3 py-1 rounded-sm border border-cyan-500 text-cyan-400 neon-text-cyan shadow-[0_0_8px_rgba(6,182,212,0.8)]';

                    let processesHtml = metricsData.top_processes.map(p => `<li><span class="text-pink-500">></span> ${p.process_name} <span class="text-gray-500">(${p.count})</span></li>`).join('');
                    document.getElementById('metrics-content').innerHTML = `
                        <p>Total Vectors Analyzed: <span class="font-bold text-white">${metricsData.total_flows_tracked}</span></p>
                        <p class="mt-3 text-cyan-700 uppercase text-xs">Primary Noise Generators:</p>
                        <ul class="mt-1 space-y-1">${processesHtml}</ul>
                    `;
                }

                // CTI Fetch
                const ctiRes = await fetch('/api/v1/threat_intel');
                const ctiData = await ctiRes.json();
                if (ctiData.report) {
                    document.getElementById('cti-content').innerText = ctiData.report;
                    if (ctiData.filename) document.getElementById('cti-filename').innerText = `SRC: ${ctiData.filename}`;
                }

                // Anomalies Fetch
                const anomaliesRes = await fetch('/api/v1/anomalies');
                const anomaliesData = await anomaliesRes.json();

                if (anomaliesData.length > 0) {
                    let tableHtml = '';
                    let processTreesHtml = '';

                    anomaliesData.slice(0, 15).forEach(a => {
                        let isCrit = a.score >= 90;
                        let rowClass = isCrit ? 'bg-pink-900/20 hover:bg-pink-900/40' : 'hover:bg-gray-800/50';
                        let scoreColor = isCrit ? 'text-pink-500 font-bold neon-text-pink' : 'text-yellow-500';

                        tableHtml += `
                            <tr class="${rowClass} transition-colors">
                                <td class="p-3 whitespace-nowrap text-gray-400 text-xs">${new Date(a.timestamp).toLocaleTimeString()}</td>
                                <td class="p-3 text-cyan-400">${a.process} <span class="text-gray-600">[${a.pid}]</span></td>
                                <td class="p-3 text-gray-300">${a.dst_ip}:${a.dst_port}</td>
                                <td class="p-3 text-xs text-purple-400">${a.mitre_technique || 'T1071'}</td>
                                <td class="p-3 ${scoreColor}">${a.score}</td>
                            </tr>
                        `;

                        if (a.process_tree) {
                            processTreesHtml += `<div class="mb-2 border-l-2 border-cyan-800 pl-2"><span class="text-pink-500">[${a.pid}]</span> ${a.process_tree}</div>`;
                        }
                    });

                    document.getElementById('anomalies-table').innerHTML = tableHtml;
                    if (processTreesHtml) document.getElementById('process-content').innerHTML = processTreesHtml;
                }
            } catch (error) {
                console.error("Link error:", error);
                const status = document.getElementById('status-indicator');
                status.innerHTML = '[ OFFLINE_LINK ]';
                status.className = 'text-xs bg-black px-3 py-1 rounded-sm border border-red-800 text-red-500';
            }
        }

        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
