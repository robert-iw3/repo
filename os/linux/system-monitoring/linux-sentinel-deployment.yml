apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: linux-sentinel
  namespace: security
  labels:
    app: linux-sentinel
spec:
  selector:
    matchLabels:
      app: linux-sentinel
  template:
    metadata:
      labels:
        app: linux-sentinel
    spec:
      containers:
      - name: linux-sentinel
        image: linux-sentinel:latest
        imagePullPolicy: IfNotPresent
        command: ["/opt/linux-sentinel/linux-sentinel"]
        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN
            - DAC_READ_SEARCH
            - SYS_PTRACE
            - SYS_ADMIN
            - SYS_RESOURCE
            - BPF
            - PERFMON
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 8080
          name: api
        env:
        - name: DASHBOARD_PORT
          value: "8080"
        resources:
          limits:
            cpu: "400m" # Reduced from 500m
            memory: "384Mi" # Reduced from 512Mi
          requests:
            cpu: "150m" # Reduced from 200m
            memory: "192Mi" # Reduced from 256Mi
        volumeMounts:
        - name: log-volume
          mountPath: /var/log/linux-sentinel
        - name: backup-volume
          mountPath: /var/backups/linux-sentinel
        livenessProbe:
          httpGet:
            path: /api/status
            port: api
          initialDelaySeconds: 20 # Increased for eBPF map allocation
          periodSeconds: 20
          timeoutSeconds: 5     # Increased to prevent K8s timeouts during SQLite bursts
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/status
            port: api
          initialDelaySeconds: 15 # Increased for YARA compilation
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: log-volume
        emptyDir: {}
      - name: backup-volume
        emptyDir: {}
      securityContext:
        fsGroup: 65534
      nodeSelector:
        kubernetes.io/os: linux