[req]
default_bits = 2048
prompt = no
default_md = sha512
distinguished_name = dn
req_extensions = req_ext

[dn]
C = US
ST = California
L = San Francisco
O = Example Corp
OU = IT
CN = haproxy.example.com

[req_ext]
subjectAltName = @alt_names
keyUsage = critical,digitalSignature,keyEncipherment
extendedKeyUsage = serverAuth

[alt_names]
DNS.1 = haproxy.example.com
DNS.2 = *.haproxy.example.com
IP.1 = 192.168.1.100