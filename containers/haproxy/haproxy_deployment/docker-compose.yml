---
services:
  haproxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/usr/local/etc/haproxy/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - haproxy-net
networks:
  haproxy-net:
    driver: bridge