---
services:
  nginx:
    container_name: nginx
    image: bitnami/nginx:1.25
    hostname: nginx.testing.io
    security_opt:
      - no-new-privileges:true
    networks:
      - tenable
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./nginx-access-logs:/var/log/nginx:z
      - ./nginx/nessus.testing.io.crt:/etc/ssl/certs/nessus.testing.io.crt:ro
      - ./nginx/nessus.testing.io.key:/etc/ssl/private/nessus.testing.io.key:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - ./nginx/nessus.testing.io.conf:/etc/nginx/conf.d/nessus.testing.io.conf:ro
    depends_on:
      nessus:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

  nessus:
    container_name: nessus
    image: tenableofficial/nessus:10.8.4
    hostname: nessus.testing.io
    security_opt:
      - no-new-privileges:true
    environment:
      USERNAME_FILE: /run/secrets/nessus_username
      PASSWORD_FILE: /run/secrets/nessus_password
      ACTIVATION_CODE_FILE: /run/secrets/activation_code
      AUTO_UPDATE: all
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_RESOURCE
    networks:
      - tenable
    ports:
      - 8834:8834
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./certs/nessus.testing.io.key:/certs/nessus.testing.io.key:ro
      - ./certs/nessus.testing.io.crt:/certs/nessus.testing.io.crt:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
      - nessus_data:/opt/nessus/var/nessus:Z
      - ./exports:/home/nessus/artifacts:z
    secrets:
      - nessus_username
      - nessus_password
      - activation_code
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8834"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  tenable:
    name: tenable
    driver: bridge

volumes:
  nessus_data:

secrets:
  nessus_username:
    file: ./secrets/nessus_username.txt
  nessus_password:
    file: ./secrets/nessus_password.txt
  activation_code:
    file: ./secrets/activation_code.txt