name: CI/CD Pipeline

on:
  push:
    branches:
      - release
  pull_request:
    branches:
      - release
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/nessus-plugin-management
  NESSUS_API_URL: https://api-fw.testing.io:8088

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run formatting
        run: npm run format

      - name: Run tests
        run: npm test

      - name: Build CSS
        run: npm run build:css

      - name: Build React app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/
          retention-days: 1

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-react
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

  validate-plugin:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate plugin with Nessus API
        env:
          NESSUS_API_KEYS: ${{ secrets.NESSUS_API_KEYS }}
        run: |
          curl -X POST -H "X-ApiKeys: $NESSUS_API_KEYS" -F "plugin=@dist/plugin.nasl" \
          ${{ env.NESSUS_API_URL }}/plugins/upload

  deploy:
    needs: [docker-build-push, validate-plugin]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VM
        env:
          DEPLOY_HOST: your-vm-host
        run: |
          ssh -o StrictHostKeyChecking=no user@$DEPLOY_HOST << 'EOF'
            # Pull the latest image
            docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.DOCKER_REGISTRY_TOKEN }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Copy docker-compose.yml and secrets
            mkdir -p ~/nessus-stack
            scp docker-compose.yml user@$DEPLOY_HOST:~/nessus-stack/
            echo "${{ secrets.NESSUS_API_KEYS }}" > ~/nessus-stack/secrets/nessus_api_keys.txt

            # Deploy with podman-compose
            cd ~/nessus-stack
            podman-compose up -d --force-recreate
          EOF