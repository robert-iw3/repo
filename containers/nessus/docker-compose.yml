---
services:
  nessus:
    container_name: nessus
    image: tenableofficial/nessus:10.8.4
    hostname: nessus.testing.io
    security_opt:
      - no-new-privileges:true
    environment:
      USERNAME_FILE: /run/secrets/nessus_username
      PASSWORD_FILE: /run/secrets/nessus_password
      ACTIVATION_CODE_FILE: /run/secrets/activation_code
      AUTO_UPDATE: all
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_RESOURCE
    networks:
      - tenable
    ports:
      - 8834:8834
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - nessus_data:/opt/nessus/var/nessus:Z
      - exports:/home/nessus/artifacts:z
      - plugins:/home/nessus/plugins:z
    secrets:
      - nessus_username
      - nessus_password
      - activation_code
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8834"]
      interval: 30s
      timeout: 3s
      retries: 3

  api-firewall:
    container_name: api-fw-ingress
    image: docker.io/wallarm/api-firewall:0.6.18
    hostname: api-fw.testing.io
    security_opt:
      - no-new-privileges:true
    networks:
      - tenable
    ports:
      - 8088:8088
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./nessusapi/nessus-api-spec.json:/api-firewall/resources/nessus-api-spec.json:ro
      - ./certs/apifw.testing.io.pem:/api-firewall/certs/apifw.testing.io.pem:ro
      - ./certs/apifw.testing.io-key.pem:/api-firewall/certs/apifw.testing.io-key.pem:ro
      - ./certs/nessus.testing.io.crt:/api-firewall/certs/nessus.testing.io.crt:ro
      - exports:/home/nessus/artifacts:z
      - plugins:/home/nessus/plugins:z
    environment:
      APIFW_URL: https://api-fw.testing.io:8088
      APIFW_TLS_CERT_FILE: /api-firewall/certs/apifw.testing.io.pem
      APIFW_TLS_CERT_KEY: /api-firewall/certs/apifw.testing.io-key.pem
      APIFW_SERVER_URL: https://nessus:8834
      APIFW_SERVER_INSECURE_CONNECTION: false
      APIFW_SERVER_ROOT_CA: /api-firewall/certs/nessus.testing.io.crt
      APIFW_API_SPECS: /api-firewall/resources/nessus-api-spec.json
      APIFW_REQUEST_VALIDATION: BLOCK
      APIFW_RESPONSE_VALIDATION: BLOCK
      APIFW_LOG_FORMAT: JSON
      APIFW_MODE: proxy
    secrets:
      - apifw_config
    restart: on-failure
    depends_on:
      nessus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088"]
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    container_name: nginx
    image: nginx:1.25
    hostname: nginx.testing.io
    security_opt:
      - no-new-privileges:true
    networks:
      - tenable
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./nginx-access-logs:/var/log/nginx:z
      - ./certs/nessus.testing.io.crt:/etc/ssl/certs/nessus.testing.io.crt:ro
      - ./certs/nessus.testing.io.key:/etc/ssl/private/nessus.testing.io.key:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nessus:
        condition: service_healthy
      api-firewall:
        condition: service_healthy
      react-app:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

  react-app:
    container_name: react-app
    build:
      context: .
      dockerfile: plugins.Dockerfile
    security_opt:
      - no-new-privileges:true
    networks:
      - tenable
    volumes:
      - exports:/home/nessus/artifacts:z
      - plugins:/home/nessus/plugins:z
    environment:
      REACT_APP_API_URL: https://api-fw.testing.io:8088
      REACT_APP_NESSUS_API_KEYS_FILE: /run/secrets/nessus_api_keys
    secrets:
      - nessus_api_keys
    depends_on:
      api-firewall:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

  parser:
    container_name: parser
    image: python:3.12-slim
    security_opt:
      - no-new-privileges:true
    networks:
      - tenable
    volumes:
      - ./nessus-parser.py:/app/nessus-parser.py:ro
      - exports:/exports:z
      - ./output:/output:z
    command: >
      bash -c "pip install xlsxwriter dateparser ipaddress requests &&
               python /app/nessus-parser.py --api-url http://api-firewall:8088
               --api-keys \"$(cat /run/secrets/nessus_api_keys)\"
               --export-dir /exports --output /output/nessus_report.xlsx"
    secrets:
      - nessus_api_keys
    depends_on:
      api-firewall:
        condition: service_healthy
    restart: on-failure

networks:
  tenable:
    name: tenable
    driver: bridge

volumes:
  nessus_data:
  exports:
  plugins:

secrets:
  nessus_username:
    file: ./secrets/nessus_username.txt
  nessus_password:
    file: ./secrets/nessus_password.txt
  activation_code:
    file: ./secrets/activation_code.txt
  apifw_config:
    file: ./secrets/apifw_config.txt
  nessus_api_keys:
    file: ./secrets/nessus_api_keys.txt