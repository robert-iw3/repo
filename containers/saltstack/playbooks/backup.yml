- name: Backup SaltStack configuration
  hosts: docker_hosts
  become: yes
  tasks:
    - name: Ensure backup directory exists
      file:
        path: /opt/saltstack/backup
        state: directory
        mode: '0755'

    - name: Backup Podman volumes
      when: platform == 'podman'
      command: podman volume export salt-master-data > /opt/saltstack/backup/salt-master-data-$(date +%Y%m%d).tar
      args:
        chdir: /opt/saltstack/backup
      register: backup_result
      failed_when: backup_result.rc != 0

    - name: Backup Docker volumes
      when: platform == 'docker'
      command: docker run --rm -v salt-master-data:/data busybox tar cvf /backup/salt-master-data-$(date +%Y%m%d).tar /data
      args:
        chdir: /opt/saltstack/backup
      register: backup_result
      failed_when: backup_result.rc != 0