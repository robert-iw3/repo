- name: Deploy SaltStack with Podman
  hosts: docker_hosts
  become: no  # Podman typically runs rootless
  tasks:
    - name: Ensure Podman is installed
      package:
        name: podman
        state: present
      become: yes  # Package installation requires sudo

    - name: Ensure podman-compose is installed
      pip:
        name: podman-compose
        state: present
      become: yes

    - name: Ensure Podman volume directory permissions
      command: podman unshare chown -R {{ ansible_user_id }}:{{ ansible_user_id }} /opt/saltstack
      args:
        creates: /opt/saltstack
      become: yes

    - name: Copy Docker Compose file
      copy:
        src: "{{ playbook_dir }}/../generated/docker-compose.yml"
        dest: /opt/saltstack/docker-compose.yml
        mode: '0644'

    - name: Deploy SaltStack stack with Podman
      command: podman-compose -f /opt/saltstack/docker-compose.yml up -d
      args:
        chdir: /opt/saltstack
      register: deploy_result
      failed_when: deploy_result.rc != 0

    - name: Rollback on failure
      command: podman-compose -f /opt/saltstack/docker-compose.yml down
      args:
        chdir: /opt/saltstack
      when: deploy_result.rc != 0