  arkime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arkime
    depends_on:
      - ${OS_NODE1}
      # - $OS_NODE2
    environment:
      - OS_HOST=${OS_NODE1}
      - OS_PORT=9200
    ports:
      - 8005:8005
      # wise
      # - 8081:8081
    volumes:
      - arkime_config:/data/config:Z
      - arkime_logs:/data/logs:Z
      - ${PCAP_DIR}:/data/pcap:Z
      #- ${EVE_DIR}/eve.json:/data/suricata/eve.json:Z
    networks:
      - arkime
    # to enable traffic capture
    #cap_add:
    #  - net_admin
    #  - net_raw
    #  - sys_nice
    #network_mode: host

volumes:
  arkime_config:
  arkime_logs:
  os01_data:
  # os02_data:

networks:
  arkime:
    driver: bridge