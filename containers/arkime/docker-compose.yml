services:

  os01:
    image: docker.io/opensearchproject/opensearch:${OS_VERSION}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    container_name: ${OS_NODE1}
    environment:
      - node.name=${OS_NODE1}
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms${OS_JAVA_MEM} -Xmx${OS_JAVA_MEM}"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - discovery.type=single-node
      # - cluster.name=os-arkime-cluster
      # - cluster.initial_cluster_manager_nodes=$OS_NODE1
      # - discovery.seed_hosts=$OS_NODE2
    volumes:
      - os01_data:/usr/share/opensearch/data:Z
    networks:
      - arkime
    #network_mode: host
    #depends_on:
    #  - nginx
    cap_add:
      - sys_nice
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

