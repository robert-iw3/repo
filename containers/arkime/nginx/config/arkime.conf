server {
    listen                                          80;
    listen                                          [::]:80;
    server_name                                     arkime localhost;
    return                                          301 https://$host$request_uri;
}


server {
    listen                                          443 ssl;
    listen                                          [::]:443 ssl;
    server_name                                     arkime localhost;

    charset                                         utf-8;
    keepalive_timeout                               70;

    client_max_body_size                            800M;

    location / {
		root /var/www/;
	}

    location ~ ^/arkime$ {
        proxy_read_timeout                          300;
        proxy_connect_timeout                       300;
        proxy_redirect                              off;
        proxy_buffering                             off;
        proxy_http_version                          1.1;
        proxy_set_header                            Host $host;
        proxy_set_header                            X-Real-IP $remote_addr;
        proxy_set_header                            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header                            X-Forwarded-Proto $scheme;
        proxy_pass                                  http://127.0.0.1:8005; # backend url to http server and port
    }

    #add_header    X-Frame-Options "SAMEORIGIN; DENY; ALLOW-FROM uri";
    #Check that the HTTP Strict-Transport-Security (HSTS) header is present on all HTTP responses.
    #add_header    Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";
    #Ensure the HTTP responses contain the X-Content-Type-Options: nosniff header.
    #add_header    X-Content-Type-Options nosniff;
    #Check if the X-XSS-Protection header is present. This header is mostly not used by modern browsers and is not required if a strong Content-Security-Policy is used that blocks inline JavaScript.
    #add_header    X-XSS-Protection "1; mode=block";

    ssl_protocols                                   TLSv1.2 TLSv1.3; # TLS protocols to use (see https://tls.imirhil.fr/protocol/ and `openssl ciphers -V | sed -r -e 's/:/\n/g'`).

    ssl_certificate                                 /etc/nginx/certs/arkime.pem;                 # RSA certificate in PEM format.
    ssl_certificate_key                             /etc/nginx/certs/arkime_rsa.key;             # Secret key in PEM format.
    ssl_trusted_certificate                         /etc/nginx/certs/arkime_chain.pem;           # Certificate chain.

    ssl_ciphers                                     'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA256:DHE-RSA-AES256-SHA:ECDHE-ECDSA-DES-CBC3-SHA:ECDHE-RSA-DES-CBC3-SHA:EDH-RSA-DES-CBC3-SHA:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA:!DSS';
    ssl_prefer_server_ciphers                       on;                                                 # Specifies that server ciphers should be preferred over client ciphers.

    ssl_dhparam                                     /etc/nginx/certs/dhparam.pem;                # Diffie-Hellman server params with 4096 bits (generated using `openssl dhparam 4096 -out /etc/ssl/private/private/dh4096.pem`).
    ssl_ecdh_curve                                  secp384r1:X25519:prime256v1;                        # Elliptic Curve Diffie-Hellman server params.

    ssl_session_cache                               shared:SSL:10m;                                     # Create a shared cache able to store about 80000 sessions (about 4000 for 1MB storage).
    ssl_session_timeout                             10m;                                                 # Timeout before session to be dropped.
    ssl_session_tickets                             off;                                                # Disable TLS session tickets.
    ssl_stapling                                    on;
    ssl_stapling_verify                             on;

    #Ensure the server does not disclose any information about the underlying server software or operating system.
    server_tokens                                   off;
}
