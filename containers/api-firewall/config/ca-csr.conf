# CA certificate configuration for API Firewall
[ req ]
default_bits = 4096
prompt = no
default_md = sha512
distinguished_name = dn
x509_extensions = ca_ext

[ dn ]
C = US
ST = CO
L = a53
O = Testing
CN = api-fw SSL Root CA

[ ca_ext ]
basicConstraints = critical, CA:TRUE
keyUsage = critical, cRLSign, keyCertSign