---
networks:
  grafana:
    driver: bridge
  traefik:
    external: true

services:
  wallarm-node:
    image: docker.io/wallarm/node:latest
    container_name: wallarm-node
    hostname: wallarm-node-api.dev
    ports:
      - 80:80
      - 443:443
    environment:
      WALLARM_API_HOST: ${WALLARM_API_HOST}
      WALLARM_API_TOKEN: ${WALLARM_API_TOKEN}
      WALLARM_API_CA_VERIFY: 'true'
      WALLARM_MODE: monitoring
      NGINX_PORT: 80
      WALLARM_LABELS: group=monitoring
      NGINX_BACKEND: grafana:3000
      WALLARM_OPENAPI_SPEC: /etc/wallarm/grafana-api-openapi.json
    volumes:
      - ./grafana-api-openapi.json:/etc/wallarm/grafana-api-openapi.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - grafana
      - traefik
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          memory: 128M