apiVersion: v1
kind: Namespace
metadata:
  name: authentik
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secrets
  namespace: authentik
type: Opaque
data:
  POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD | b64encode}
  POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRESQL_REPLICATION_PASSWORD | b64encode}
  AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY | b64encode}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-config
  namespace: authentik
data:
  POSTGRESQL_USERNAME: ${POSTGRESQL_USERNAME}
  POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE}
  POSTGRESQL_REPLICATION_USER: ${POSTGRESQL_REPLICATION_USER}
  AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST}
  AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT}
  AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME}
  AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD}
  AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM}
  SOCKET_PATH: /var/run/docker.sock
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: authentik
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: postgresql
        image: docker.io/bitnami/postgresql:latest
        envFrom:
        - configMapRef:
            name: authentik-config
        - secretRef:
            name: authentik-secrets
        env:
        - name: POSTGRESQL_REPLICATION_MODE
          value: master
        - name: POSTGRESQL_MASTER_HOST
          value: postgresql.authentik.svc.cluster.local
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /bitnami/postgresql
        livenessProbe:
          exec:
            command: ["pg_isready", "-d", "${POSTGRESQL_DATABASE}", "-U", "${POSTGRESQL_USERNAME}"]
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["pg_isready", "-d", "${POSTGRESQL_DATABASE}", "-U", "${POSTGRESQL_USERNAME}"]
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        resources:
          limits:
            cpu: "1"
            memory: 2048Mi
          requests:
            cpu: "0.5"
            memory: 512Mi
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: redis
        image: docker.io/redis:alpine
        command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          exec:
            command: ["redis-cli", "--raw", "incr", "ping"]
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          exec:
            command: ["redis-cli", "--raw", "incr", "ping"]
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 3
        resources:
          limits:
            cpu: "0.5"
            memory: 2048Mi
          requests:
            cpu: "0.25"
            memory: 512Mi
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: authentik-server
        image: ghcr.io/goauthentik/server:2025.10.1
        envFrom:
        - configMapRef:
            name: authentik-config
        - secretRef:
            name: authentik-secrets
        env:
        - name: AUTHENTIK_REDIS__HOST
          value: redis.authentik.svc.cluster.local
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: postgresql.authentik.svc.cluster.local
        ports:
        - containerPort: 9000
        - containerPort: 9443
        volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates
        - name: certs
          mountPath: /certs
        livenessProbe:
          httpGet:
            path: /if/healthz
            port: 9000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /if/healthz
            port: 9000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 10
        resources:
          limits:
            cpu: "1"
            memory: 2048Mi
          requests:
            cpu: "0.5"
            memory: 512Mi
      volumes:
      - name: media
        emptyDir: {}
      - name: templates
        emptyDir: {}
      - name: certs
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: authentik-worker
        image: ghcr.io/goauthentik/server:2025.10.1
        command: ["worker"]
        envFrom:
        - configMapRef:
            name: authentik-config
        - secretRef:
            name: authentik-secrets
        env:
        - name: AUTHENTIK_REDIS__HOST
          value: redis.authentik.svc.cluster.local
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: postgresql.authentik.svc.cluster.local
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates
        - name: certs
          mountPath: /certs
        livenessProbe:
          httpGet:
            path: /if/healthz
            port: 9000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /if/healthz
            port: 9000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 10
        resources:
          limits:
            cpu: "1"
            memory: 2048Mi
          requests:
            cpu: "0.5"
            memory: 512Mi
      - name: docker-socket-proxy
        image: docker.io/tecnativa/docker-socket-proxy
        securityContext:
          privileged: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_ADMIN
            - NET_RAW
        env:
        - name: CONTAINERS
          value: "1"
        - name: EXEC
          value: "1"
        - name: NETWORKS
          value: "1"
        - name: POST
          value: "1"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: haproxy-config
          mountPath: /usr/local/etc/haproxy/haproxy.cfg
          subPath: haproxy.cfg
        resources:
          limits:
            cpu: "0.5"
            memory: 512Mi
          requests:
            cpu: "0.25"
            memory: 256Mi
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
      - name: media
        emptyDir: {}
      - name: templates
        emptyDir: {}
      - name: certs
        emptyDir: {}
      - name: haproxy-config
        configMap:
          name: haproxy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: authentik
data:
  haproxy.cfg: |
    global
      log stdout format raw daemon "info"
      maxconn 4000
      server-state-file /var/lib/haproxy/server-state
    defaults
      mode http
      log global
      option httplog
      option dontlognull
      option http-server-close
      option redispatch
      retries 3
      timeout http-request 10s
      timeout queue 1m
      timeout connect 10s
      timeout client 10m
      timeout server 10m
      timeout http-keep-alive 10s
      timeout check 10s
      maxconn 3000
      load-server-state-from-file global
    backend dockerbackend
      server dockersocket /var/run/docker.sock
    backend docker-events
      server dockersocket /var/run/docker.sock
      timeout server 0
    frontend dockerfrontend
      bind :::2375 v4v6
      http-request deny unless METH_GET || { env(POST) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/[a-zA-Z0-9_.-]+/((stop)|(restart)|(kill)) } { env(ALLOW_RESTARTS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/[a-zA-Z0-9_.-]+/start } { env(ALLOW_START) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/[a-zA-Z0-9_.-]+/stop } { env(ALLOW_STOP) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/auth } { env(AUTH) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/build } { env(BUILD) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/commit } { env(COMMIT) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/configs } { env(CONFIGS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers } { env(CONTAINERS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/distribution } { env(DISTRIBUTION) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/events } { env(EVENTS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/exec } { env(EXEC) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/grpc } { env(GRPC) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/images } { env(IMAGES) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/info } { env(INFO) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/networks } { env(NETWORKS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/nodes } { env(NODES) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/_ping } { env(PING) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/plugins } { env(PLUGINS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/secrets } { env(SECRETS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/services } { env(SERVICES) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/session } { env(SESSION) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/swarm } { env(SWARM) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/system } { env(SYSTEM) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/tasks } { env(TASKS) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/version } { env(VERSION) -m bool }
      http-request allow if { path,url_dec -m reg -i ^(/v[\d\.]+)?/volumes } { env(VOLUMES) -m bool }
      http-request deny
      default_backend dockerbackend
      use_backend docker-events if { path,url_dec -m reg -i ^(/v[\d\.]+)?/events }
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: authentik
spec:
  selector:
    app: postgresql
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: authentik
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: authentik
spec:
  selector:
    app: authentik-server
  ports:
  - name: http
    port: 9000
    targetPort: 9000
  - name: https
    port: 9443
    targetPort: 9443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authentik-network-policy
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: authentik-server
    - podSelector:
        matchLabels:
          app: authentik-worker
    - podSelector:
        matchLabels:
          app: postgresql
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9000
    - protocol: TCP
      port: 9443
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgresql
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379