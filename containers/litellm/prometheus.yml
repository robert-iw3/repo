global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']
  - job_name: 'caddy'
    static_configs:
      - targets: ['caddy:80']
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']