apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.76.1
          ports:
            - containerPort: 4000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: ANTHROPIC_API_KEY
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/google_credentials.json
            - name: GOOGLE_VERTEX_LOCATION
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: GOOGLE_VERTEX_LOCATION
            - name: GOOGLE_VERTEX_PROJECT
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: GOOGLE_VERTEX_PROJECT
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: GROQ_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: OPENAI_API_KEY
            - name: POSTGRES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: POSTGRES_DB_URL
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: UI_PASSWORD
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: UI_USERNAME
          volumeMounts:
            - name: config
              mountPath: /app/litellm_config.yaml
              subPath: litellm_config.yaml
            - name: google-credentials
              mountPath: /app/google_credentials.json
              subPath: google_credentials.json
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "0.5"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: google-credentials
          secret:
            name: litellm-secrets
            items:
              - key: google_credentials.json
                path: google_credentials.json
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
spec:
  selector:
    app: litellm
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000