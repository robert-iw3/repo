---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  labels:
    app: cassandra
spec:
  clusterIP: None
  selector:
    app: cassandra
  ports:
    - port: 9042
      name: cql
    - port: 7000
      name: intra-node
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
spec:
  serviceName: cassandra
  replicas: 2
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      terminationGracePeriodSeconds: 1800
      initContainers:
        - name: init-cassandra
          image: cassandra:5.0
          command: ["/init-cassandra.sh"]
          env:
            - name: CASSANDRA_PASSWORD_SEEDER
              value: "yes"  # Only first pod seeds auth
            - name: CASSANDRA_PASSWORD
              value: "cassandra"
          volumeMounts:
            - name: config
              mountPath: /init-cassandra.sh
              subPath: init-cassandra.sh
      containers:
        - name: cassandra
          image: cassandra:5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
              name: intra-node
            - containerPort: 7001
              name: tls-intra-node
            - containerPort: 7199
              name: jmx
            - containerPort: 9042
              name: cql
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "cassandra-cluster"
            - name: CASSANDRA_SEEDS
              value: "cassandra-0.cassandra.default.svc.cluster.local"
            - name: MAX_HEAP_SIZE
              value: "4G"
            - name: HEAP_NEWSIZE
              value: "800M"
            - name: JVM_OPTS
              value: "-XX:+UseContainerSupport"
            - name: CASSANDRA_PASSWORD
              value: "cassandra"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CASSANDRA_LISTEN_ADDRESS
              value: "$(POD_IP)"
            - name: CASSANDRA_BROADCAST_ADDRESS
              value: "$(POD_IP)"
            - name: CASSANDRA_RPC_ADDRESS
              value: "0.0.0.0"
          resources:
            requests:
              memory: "5Gi"
              cpu: "2"
            limits:
              memory: "5Gi"
              cpu: "2"
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
            - name: config
              mountPath: /etc/cassandra/cassandra.yaml
              subPath: cassandra.yaml
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "nodetool status | grep -q UN"]
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "nodetool status"]
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: cassandra-config
            items:
              - key: cassandra.yaml
                path: cassandra.yaml
              - key: init-cassandra.sh
                path: init-cassandra.sh
  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-config
data:
  cassandra.yaml: |
    cluster_name: 'cassandra-cluster'
    num_tokens: 256
    hinted_handoff_enabled: true
    max_hint_window_in_ms: 10800000
    hinted_handoff_throttle_in_kb: 1024
    max_hints_delivery_threads: 2
    batchlog_replay_throttle_in_kb: 1024
    authenticator: PasswordAuthenticator
    authorizer: CassandraAuthorizer
    permissions_validity_in_ms: 2000
    partitioner: org.apache.cassandra.dht.Murmur3Partitioner
    data_file_directories:
      - /var/lib/cassandra/data
    commitlog_directory: /var/lib/cassandra/commitlog
    cdc_enabled: false
    cdc_raw_directory: /var/lib/cassandra/cdc_raw
    disk_failure_policy: stop
    commit_failure_policy: stop
    key_cache_save_period: 14400
    row_cache_size_in_mb: 0
    row_cache_save_period: 0
    counter_cache_save_period: 7200
    commitlog_sync: periodic
    commitlog_sync_period_in_ms: 10000
    commitlog_segment_size_in_mb: 32
    concurrent_reads: 32
    concurrent_writes: 32
    concurrent_counter_writes: 32
    memtable_allocation_type: heap_buffers
    index_summary_resize_interval_in_minutes: 60
    trickle_fsync: false
    trickle_fsync_interval_in_kb: 10240
    storage_port: 7000
    ssl_storage_port: 7001
    start_native_transport: true
    native_transport_port: 9042
    start_rpc: false
    rpc_port: 9160
    rpc_keepalive: true
    rpc_server_type: sync
    thrift_framed_transport_size_in_mb: 15
    incremental_backups: true
    snapshot_before_compaction: false
    auto_snapshot: true
    tombstone_warn_threshold: 1000
    tombstone_failure_threshold: 100000
    column_index_size_in_kb: 64
    batch_size_warn_threshold_in_kb: 5
    compaction_throughput_mb_per_sec: 16
    sstable_preemptive_open_interval_in_mb: 50
    read_request_timeout_in_ms: 5000
    range_request_timeout_in_ms: 10000
    write_request_timeout_in_ms: 2000
    counter_write_request_timeout_in_ms: 5000
    cas_contention_timeout_in_ms: 1000
    truncate_request_timeout_in_ms: 60000
    request_timeout_in_ms: 10000
    cross_node_timeout: false
    endpoint_snitch: GossipingPropertyFileSnitch
    dynamic_snitch_update_interval_in_ms: 100
    dynamic_snitch_reset_interval_in_ms: 600000
    dynamic_snitch_badness_threshold: 0.1
    request_scheduler: org.apache.cassandra.scheduler.NoScheduler
    server_encryption_options:
      internode_encryption: all
      keystore: /etc/cassandra/.keystore
      keystore_password: cassandra
      truststore: /etc/cassandra/.truststore
      truststore_password: cassandra
    client_encryption_options:
      enabled: false
      keystore: /etc/cassandra/.keystore
      keystore_password: cassandra
    internode_compression: dc
    inter_dc_tcp_nodelay: false
    enable_materialized_views: false
  init-cassandra.sh: |
    #!/bin/bash
    set -e
    if [ "$CASSANDRA_PASSWORD_SEEDER" != "yes" ]; then
      echo "Not a seeder node, skipping auth setup."
      exit 0
    fi
    echo "Waiting for Cassandra to start..."
    until cqlsh -u cassandra -p cassandra -e "describe keyspaces" > /dev/null 2>&1; do
      sleep 5
    done
    if [ -n "$CASSANDRA_PASSWORD" ]; then
      echo "Setting cassandra user password..."
      cqlsh -u cassandra -p cassandra -e "ALTER USER cassandra WITH PASSWORD '$CASSANDRA_PASSWORD'"
      echo "Password updated successfully."
    else
      echo "CASSANDRA_PASSWORD not set, skipping password update."
    fi