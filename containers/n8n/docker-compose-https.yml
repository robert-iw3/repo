# n8n https with ssl cert generated with "ssl.sh"
# continue to haproxy for loadbalancing/proxy if not using traefik
# api-firewall for additional verification, modify qdrant-api.json
volumes:
  n8n_storage:
    driver: local
  postgres_storage:
    driver: local
  qdrant_storage:
    driver: local
  ollama_storage:
    driver: local

networks:
  n8n:
    driver: bridge

x-common-vars-apps: &common-vars-apps
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - n8n

x-n8n: &service-n8n
  image: docker.io/n8nio/n8n:latest
  networks: ['n8n']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    #- OLLAMA_HOST=ollama:11434
  restart: unless-stopped
  links:
    - postgres
# pull model (replace here)
x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks: ['n8n']
  container_name: ollama-pull-llama
  volumes:
    - ollama_storage:/root/.ollama:z
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "sleep 15; ollama pull llama3.1:8b"

services:
  postgres:
    <<: *common-vars-apps
    image: docker.io/postgres:16-alpine
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data:Z
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  traefik:
    <<: *common-vars-apps
    image: docker.io/traefik:latest
    container_name: traefik
    hostname: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro,Z
      - ./tls.yml:/etc/traefik/dynamic/tls.yml:ro,Z
      - ./n8n.yaml:/etc/traefik/dynamic/n8n.yml:ro,Z
      - ./certs/:/etc/ssl/traefik:Z
      #- /var/run/docker.sock:/var/run/docker.sock:ro
      # https://github.com/containers/podman/blob/main/docs/tutorials/socket_activation.md
      - $XDG_RUNTIME_DIR/podman/podman.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"

# place credentials in backup/credentials and workflows in backup/workflows
  n8n-import:
    <<: *service-n8n
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - "n8n import:credentials --separate --input=/backup/credentials && n8n import:workflow --separate --input=/backup/workflows"
    volumes:
      - ./backup:/backup:ro,Z
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    container_name: n8n
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n:Z
      - ./n8n/backup:/backup:ro,Z
      - ./shared:/data/shared:ro,Z
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
    labels:
      - "traefik.http.routers.n8n.rule=Host(`n8n.io`)"
      - "traefik.http.routers.n8n-tls.tls.domains[0].main=n8n.io"
      - "traefik.http.routers.n8n-tls.tls.domains[0].sans=*.n8n.io"
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"

  qdrant:
    <<: *common-vars-apps
    image: docker.io/qdrant/qdrant
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage:Z

  ollama-nvidia:
    <<: *common-vars-apps
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    pull_policy: always
    tty: true
    cap_drop:
      - ALL
    cap_add:
      - SYS_NICE
    ports:
      - "127.0.0.1:11434:11434/tcp"
    volumes:
      - ollama_storage:/root/.ollama:z
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-nvidia