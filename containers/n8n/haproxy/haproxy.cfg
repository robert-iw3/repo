global
    log stdout format raw daemon "${LOG_LEVEL}"

    pidfile /run/haproxy.pid
    maxconn 4000

    # Increase the default DH parameter size to at least 2048 bits
    tune.ssl.default-dh-param 2048

    # Turn on stats unix socket
    server-state-file /var/lib/haproxy/server-state

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 5m
    timeout server 5m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

    # Allow seamless reloads
    load-server-state-from-file global

    # Use provided example error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

frontend n8n
    description "n8n"
    bind *:80
    bind *:443 ssl crt /certs/n8n.crt
    bind *:5678
    redirect scheme https code 301 if !{ ssl_fc }
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-response set-header Strict-Transport-Security "max-age=16000000; includeSubDomains; preload;"
    default_backend n8n

frontend qdrant
    description "qdrant api"
    bind *:6333
    default_backend qdrant

backend n8n
    description "n8n"
    balance roundrobin
    acl internal_networks src 192.168.0.0/16 172.16.0.0/12 10.0.0.0/8 127.0.0.1
    http-request deny if ! internal_networks
    http-check expect string "n8n"
    timeout http-request 5s
    cookie SERVERID insert indirect nocache
    server n8n n8n:5678 check cookie s1
    server 127.0.0.1 localhost:5678 check cookie s3 ssl verify noneglobal

backend qdrant
    description "qdrant api"
    balance roundrobin
    acl internal_networks src 192.168.0.0/16 172.16.0.0/12 10.0.0.0/8 127.0.0.1
    http-request deny if ! internal_networks
    option httpchk GET /
    http-check expect string "qdrant"
    timeout http-request 5s
    server qdrant qdrant:6333 check
    server host.containers.internal host.containers.internal:6333 check
    server 127.0.0.1 127.0.0.1:6333 check