---
services:
  tailscale:
    image: docker.io/tailscale/tailscale:latest
    container_name: tailscale
    hostname: tailscale-exit-node
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_ROUTES=${SUBNET_CIDR:-192.168.1.0/24}
      - TS_EXTRA_ARGS=--advertise-exit-node --accept-routes
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_ENABLE_METRICS=true
    volumes:
      - tailscale-state:/var/lib/tailscale:Z
      - /dev/net/tun:/dev/net/tun:Z
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tailscale-state: