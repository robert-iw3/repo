apiVersion: v1
kind: Secret
metadata:
  name: artifactory-secrets
type: Opaque
stringData:
  postgres_db: artifactory
  postgres_user: artifactory
  postgres_password: "" # To be filled by user or script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: artifactory-config
data:
  system.yaml: |
    configVersion: 1
    shared:
      javaHome: "/usr/lib/jvm/jre-17-openjdk/"
      extraJavaOpts: "-Xms2g -Xmx2g"
      security:
        bootstrapKeysReadTimeoutSecs: 120
      node:
        haEnabled: false
      database:
        type: postgresql
        driver: org.postgresql.Driver
        url: "jdbc:postgresql://postgres-service:5432/artifactory"
        username: artifactory
        password: "" # Populated by secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifactory
  labels:
    app: artifactory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifactory
  template:
    metadata:
      labels:
        app: artifactory
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: artifactory
        image: releases-docker.jfrog.io/jfrog/artifactory-oss:7.104.10
        env:
        - name: JF_ROUTER_ENTRYPOINTS_EXTERNALPORT
          value: "8082"
        - name: DB_TYPE
          value: postgresql
        - name: DB_HOST
          value: postgres-service
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: artifactory-secrets
              key: postgres_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artifactory-secrets
              key: postgres_password
        - name: EXTRA_JAVA_OPTIONS
          value: "-Xms512m -Xmx4g"
        ports:
        - containerPort: 8081
        - containerPort: 8082
        - containerPort: 8085
        volumeMounts:
        - name: artifactory-data
          mountPath: /var/opt/jfrog/artifactory
        - name: config
          mountPath: /artifactory_home/etc/system.yaml
          subPath: system.yaml
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /artifactory/api/system/ping
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
      volumes:
      - name: artifactory-data
        persistentVolumeClaim:
          claimName: artifactory-pvc
      - name: config
        configMap:
          name: artifactory-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
      - name: nginx
        image: releases-docker.jfrog.io/jfrog/nginx-artifactory:7.104.10
        env:
        - name: ART_BASE_URL
          value: "http://artifactory-service:8082"
        - name: NGINX_LOG_ROTATE_COUNT
          value: "10"
        - name: NGINX_LOG_ROTATE_SIZE
          value: "50m"
        - name: SSL
          value: "true"
        ports:
        - containerPort: 80
        - containerPort: 443
        volumeMounts:
        - name: nginx-data
          mountPath: /var/opt/jfrog/nginx
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: nginx-data
        persistentVolumeClaim:
          claimName: nginx-pvc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: postgres
        image: postgres:13
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: artifactory-secrets
              key: postgres_db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: artifactory-secrets
              key: postgres_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artifactory-secrets
              key: postgres_password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "artifactory"]
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: artifactory-service
spec:
  selector:
    app: artifactory
  ports:
  - name: http
    port: 8081
    targetPort: 8081
  - name: router
    port: 8082
    targetPort: 8082
  - name: federation
    port: 8085
    targetPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifactory-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 443
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: artifactory-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi