name: Deploy Bitbucket

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run unit tests
      run: python -m unittest test_deploy_bitbucket.py
    - name: Run integration tests
      run: python -m unittest test_integration.py

  deploy_docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Tag Docker images with commit SHA
      run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV
    - name: Deploy with Docker Compose
      run: docker-compose -f docker-compose.yml up -d --no-build
      env:
        VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
        VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        VAULT_SECRET_PATH: ${{ secrets.VAULT_SECRET_PATH }}
        USE_VAULT: "true"
        IMAGE_TAG: ${{ env.IMAGE_TAG }}
    - name: Validate deployment health
      run: |
        sleep 60
        curl -f http://${{ secrets.BITBUCKET_IPv4 }}:7990/status
        if [ $? -ne 0 ]; then
          echo "Deployment health check failed"
          exit 1
        fi
    - name: Validate backup
      run: |
        sleep 1800
        BACKUP=$(docker exec postgres2-bitbucket ls /srv/bitbucket-postgres/backups | grep bitbucket-postgres-backup | tail -1)
        docker exec -e PGPASSWORD=$(cat secrets/postgresql_password) postgres-bitbucket \
          bash -c "zstd -d -c /srv/bitbucket-postgres/backups/$BACKUP | psql -d test_restore"
        if [ $? -eq 0 ]; then
          echo "Backup validated"
        else
          echo "Backup validation failed"
          exit 1
        fi

  deploy_kubernetes:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    - name: Configure Kubernetes
      run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
    - name: Tag manifests with commit SHA
      run: echo "MANIFEST_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV
    - name: Deploy to Kubernetes
      run: |
        sed -i "s/:latest/:${{ env.MANIFEST_TAG }}/g" bitbucket-deployment.yml
        sed -i "s/:latest/:${{ env.MANIFEST_TAG }}/g" postgres-deployment.yml
        kubectl apply -f bitbucket-deployment.yml -f postgres-deployment.yml -f network-policy.yml -f multi-region.yml
      env:
        KUBECONFIG: kubeconfig.yaml
        VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
        VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        VAULT_SECRET_PATH: ${{ secrets.VAULT_SECRET_PATH }}
    - name: Validate deployment health
      run: |
        sleep 60
        kubectl -n bitbucket get pods -l app=bitbucket --no-headers | grep Running
        if [ $? -ne 0 ]; then
          echo "Kubernetes deployment health check failed"
          exit 1
        fi

  chaos_test:
    needs: deploy_kubernetes
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    - name: Configure Kubernetes
      run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
    - name: Apply chaos test
      run: |
        kubectl apply -f chaos-test.yml
        sleep 120
        kubectl -n bitbucket get pods -l app=bitbucket --no-headers | grep Running || exit 1
        kubectl -n bitbucket get chaosmesh --no-headers | grep Finished || exit 1
      env:
        KUBECONFIG: kubeconfig.yaml
        VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
        VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

  rollback:
    needs: [deploy_docker, deploy_kubernetes]
    if: failure()
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      if: needs.deploy_docker.result == 'failure'
    - name: Login to DockerHub
      uses: docker/login-action@v2
      if: needs.deploy_docker.result == 'failure'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Rollback Docker deployment
      if: needs.deploy_docker.result == 'failure'
      run: |
        PREVIOUS_TAG=$(docker images --format "{{.Tag}}" | grep -v ${GITHUB_SHA::8} | head -n 1)
        if [ -n "$PREVIOUS_TAG" ]; then
          sed -i "s/${GITHUB_SHA::8}/$PREVIOUS_TAG/g" docker-compose.yml
          docker-compose -f docker-compose.yml up -d --no-build
          echo "Rolled back Docker deployment to tag $PREVIOUS_TAG"
        else
          echo "No previous tag found for rollback"
          exit 1
        fi
      env:
        VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
        VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        VAULT_SECRET_PATH: ${{ secrets.VAULT_SECRET_PATH }}
        USE_VAULT: "true"
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      if: needs.deploy_kubernetes.result == 'failure'
      with:
        version: 'latest'
    - name: Configure Kubernetes
      if: needs.deploy_kubernetes.result == 'failure'
      run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
    - name: Rollback Kubernetes deployment
      if: needs.deploy_kubernetes.result == 'failure'
      run: |
        PREVIOUS_TAG=$(kubectl -n bitbucket get deployments bitbucket -o jsonpath='{.spec.template.spec.containers[0].image}' | grep -o ':.*$' | cut -c 2- | grep -v ${GITHUB_SHA::8} || echo "previous")
        if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "previous" ]; then
          sed -i "s/:${GITHUB_SHA::8}/:$PREVIOUS_TAG/g" bitbucket-deployment.yml
          sed -i "s/:${GITHUB_SHA::8}/:$PREVIOUS_TAG/g" postgres-deployment.yml
          kubectl apply -f bitbucket-deployment.yml -f postgres-deployment.yml -f network-policy.yml -f multi-region.yml
          echo "Rolled back Kubernetes deployment to tag $PREVIOUS_TAG"
        else
          echo "No previous tag found for rollback"
          exit 1
        fi
      env:
        KUBECONFIG: kubeconfig.yaml
        VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
        VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        VAULT_SECRET_PATH: ${{ secrets.VAULT_SECRET_PATH }}