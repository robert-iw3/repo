apiVersion: v1
kind: Namespace
metadata:
  name: bitbucket
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-bitbucket
  namespace: bitbucket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: postgres-bitbucket
  template:
    metadata:
      labels:
        app: postgres-bitbucket
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
      - name: postgres
        image: postgres:13
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: bitbucket-secrets
              key: POSTGRESQL_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bitbucket-secrets
              key: POSTGRESQL_PASSWORD
        - name: POSTGRES_DB
          value: bitbucket
        - name: POSTGRES_REPLICATION_USER
          valueFrom:
            secretKeyRef:
              name: bitbucket-secrets
              key: POSTGRESQL_REPLICATION_USER
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bitbucket-secrets
              key: POSTGRESQL_REPLICATION_PASSWORD
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: backup-dir
          mountPath: /srv/bitbucket-postgres/backups
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "bitbucket_user"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "bitbucket_user"]
          initialDelaySeconds: 30
          periodSeconds: 10
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:latest
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://bitbucket_user@postgres-bitbucket:5432/bitbucket?sslmode=disable"
        ports:
        - containerPort: 9187
          name: metrics
        resources:
          limits:
            cpu: "0.2"
            memory: "128Mi"
          requests:
            cpu: "0.1"
            memory: "64Mi"
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: backup-dir
        persistentVolumeClaim:
          claimName: postgres-backup-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-bitbucket
  namespace: bitbucket
spec:
  selector:
    app: postgres-bitbucket
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
  - name: metrics
    port: 9187
    targetPort: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: bitbucket
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: bitbucket
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: postgres-hpa
  namespace: bitbucket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: postgres-bitbucket
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: bitbucket
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres-bitbucket
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-monitor
  namespace: bitbucket
spec:
  selector:
    matchLabels:
      app: postgres-bitbucket
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s