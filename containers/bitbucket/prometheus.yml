global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'bitbucket'
    static_configs:
      - targets: ['bitbucket:7991']
  - job_name: 'bitbucket-exporter'
    static_configs:
      - targets: ['bitbucket-exporter:8000']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']