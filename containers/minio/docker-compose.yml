## By default this config uses default local driver,
## For custom volumes replace with volume driver configuration.
volumes:
  data1-1:
  data1-2:
  data2-1:
  data2-2:
  data3-1:
  data3-2:
  data4-1:
  data4-2:

networks:
  s3:
    driver: internal

x-common-vars-apps: &common-vars-apps
  image: quay.io/minio/minio:RELEASE.2025-02-18T16-25-55Z
  command: server --console-address ":9001" http://minio{1...4}/data{1...2}
  expose:
    - "9000:9000"
    - "9001:9001"
  environment:
    MINIO_ROOT_USER: ${MINIO_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_PASS}
  healthcheck:
    test: ["CMD", "mc", "ready", "local"]
    interval: 5s
    timeout: 5s
    retries: 5
  security_opt: ['no-new-privileges:true']
  restart: unless-stopped
  env_file: ['.env']
  networks: ['s3']

services:

  minio1:
    <<: *common-vars-apps
    container_name: minio1
    hostname: minio1
    volumes:
      - data1-1:/data1
      - data1-2:/data2

  minio2:
    <<: *common-vars-apps
    container_name: minio2
    hostname: minio2
    volumes:
      - data2-1:/data1
      - data2-2:/data2

  minio3:
    <<: *common-vars-apps
    container_name: minio3
    hostname: minio3
    volumes:
      - data3-1:/data1
      - data3-2:/data2

  minio4:
    <<: *common-vars-apps
    container_name: minio4
    hostname: minio4
    volumes:
      - data4-1:/data1
      - data4-2:/data2

  nginx:
    image: docker.io/nginx:stable-alpine
    hostname: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    depends_on:
      minio1:
        condition: service_healthy
      minio2:
        condition: service_healthy
      minio3:
        condition: service_healthy
      minio4:
        condition: service_healthy
    security_opt: no-new-privileges:true
    restart: unless-stopped
    networks: s3

  minio-createbucket:
    image: docker.io/minio/mc
    depends_on:
      minio1:
        condition: service_healthy
      minio2:
        condition: service_healthy
      minio3:
        condition: service_healthy
      minio4:
        condition: service_healthy
    security_opt: no-new-privileges:true
    restart: unless-stopped
    env_file: .env
    networks: s3
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET: ${AWS_BUCKET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./sync-aws.sh:/:ro,Z
      - ./.env:/.env:ro
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio{1...4}:9000 ${MINIO_USER} ${MINIO_PASS};
      # load a bucket config bootstrap script here or issue commands:
      /usr/bin/mc mb minio/Main_Bucket;
      # chmod +x /sync-aws.sh; /sync-aws.sh;
      exit 0;
      "
