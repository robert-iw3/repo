apiVersion: apps/v1
kind: Deployment
metadata:
  name: suricata-connector
  namespace: {{namespace}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: suricata-connector
  template:
    metadata:
      labels:
        app: suricata-connector
    spec:
      containers:
      - name: suricata-connector
        image: suricata-connector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LOG_DIR
          value: "/var/log/suricata"
        - name: SPLUNK_ENABLED
          value: "{{splunk_enabled}}"
        - name: SPLUNK_HEC_URL
          value: "{{splunk_hec_url}}"
        - name: SPLUNK_TOKEN
          value: "{{splunk_token}}"
        - name: ES_ENABLED
          value: "{{es_enabled}}"
        - name: ES_HOST
          value: "{{es_host}}"
        - name: ES_INDEX
          value: "{{es_index}}"
        - name: BATCH_SIZE
          value: "{{batch_size}}"
        - name: BUFFER_TIMEOUT
          value: "{{buffer_timeout}}"
        - name: WORKER_COUNT
          value: "{{worker_count}}"
        volumeMounts:
        - name: logs
          mountPath: /var/log/suricata
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pidof", "python3"]
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["pidof", "python3"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: suricata-logs