services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: postgres
    volumes:
    - ./data/postgresql/data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
    - "5432:5432"
    healthcheck:
      test: pg_isready -U postgres -d keycloak
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 10s

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keycloak
    environment:
      KC_PROXY_ADDRESS_FORWARDING: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_ADMIN_URL: "https://keycloak/auth"
      KC_HOSTNAME_PATH: auth
      KC_PROXY: edge
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASS}
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${DB_PASS}
      KC_HOSTNAME: keycloak.io
    ports:
    - "8080:8080"
    - "8443:8443"
    - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy