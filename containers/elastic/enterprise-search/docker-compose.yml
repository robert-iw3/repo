x-common-vars-apps: &common-vars-apps
  networks:
    - elastic
  security_opt:
    - no-new-privileges:true
  restart: on-failure
  env_file:
    - ./.env

services:
  enterprise-search:
    <<: *common-vars-apps
    build:
      context: .
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    volumes:
      - ./config/enterprise-search.yml:/usr/share/enterprise-search/config/enterprise-search.yml:ro,Z
    environment:
      JAVA_OPTS: -Xms2g -Xmx2g
      ENT_SEARCH_DEFAULT_PASSWORD: ${ENT_SEARCH_DEFAULT_PASSWORD}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    ports:
      - 3002:3002
    depends_on:
      - elasticsearch