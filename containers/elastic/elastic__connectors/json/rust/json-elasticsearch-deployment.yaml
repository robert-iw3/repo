apiVersion: apps/v1
kind: Deployment
metadata:
  name: json-elasticsearch
  namespace: {{namespace}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: json-elasticsearch
  template:
    metadata:
      labels:
        app: json-elasticsearch
    spec:
      containers:
      - name: json-elasticsearch
        image: json-connector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: JSON_LOG_DIR
          value: "/var/log/json_data"
        - name: SCHEMAS_FILE
          value: "/app/schemas.yaml"
        - name: ES_ENABLED
          value: "true"
        - name: ES_HOST
          value: "{{es_host}}"
        - name: ES_INDEX
          value: "{{es_index}}"
        - name: BATCH_SIZE
          value: "{{batch_size}}"
        - name: BUFFER_TIMEOUT
          value: "{{buffer_timeout}}"
        - name: WORKER_COUNT
          value: "{{worker_count}}"
        - name: CONFIG_FILE
          value: "/app/deploy_config.yaml"
        volumeMounts:
        - name: json-logs
          mountPath: /var/log/json_data
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pidof", "json-connector"]
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["pidof", "json-connector"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: json-logs
        persistentVolumeClaim:
          claimName: json-logs