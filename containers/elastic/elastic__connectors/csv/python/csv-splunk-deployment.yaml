apiVersion: apps/v1
kind: Deployment
metadata:
  name: csv-splunk
  namespace: {{namespace}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: csv-splunk
  template:
    metadata:
      labels:
        app: csv-splunk
    spec:
      containers:
      - name: csv-splunk
        image: csv-connector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CSV_LOG_DIR
          value: "/var/log/csv_data"
        - name: SCHEMAS_FILE
          value: "/app/schemas.yaml"
        - name: SPLUNK_HEC_URL
          value: "{{splunk_hec_url}}"
        - name: SPLUNK_TOKEN
          value: "{{splunk_token}}"
        - name: BATCH_SIZE
          value: "{{batch_size}}"
        - name: BUFFER_TIMEOUT
          value: "{{buffer_timeout}}"
        - name: WORKER_COUNT
          value: "{{worker_count}}"
        - name: ENABLE_SPLUNK
          value: "true"
        - name: CSV_DELIMITER
          value: "{{delimiter}}"
        volumeMounts:
        - name: csv-logs
          mountPath: /var/log/csv_data
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pidof", "python3"]
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["pidof", "python3"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: csv-logs
        persistentVolumeClaim:
          claimName: csv-logs