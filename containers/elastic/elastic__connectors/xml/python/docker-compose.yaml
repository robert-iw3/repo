---
services:
  xml-splunk:
    build:
      context: .
      dockerfile: Dockerfile.connector
    environment:
      - XML_LOG_DIR=/var/log/xml_data
      - SCHEMAS_FILE=/app/schemas.yaml
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL:-https://your-splunk-host:8088/services/collector/event}
      - SPLUNK_TOKEN=${SPLUNK_TOKEN:-your-splunk-hec-token}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BUFFER_TIMEOUT=${BUFFER_TIMEOUT:-2.0}
      - WORKER_COUNT=${WORKER_COUNT:-4}
      - ENABLE_SPLUNK=true
    volumes:
      - xml-logs:/var/log/xml_data:Z
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    restart: unless-stopped
  xml-elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.connector
    environment:
      - XML_LOG_DIR=/var/log/xml_data
      - SCHEMAS_FILE=/app/schemas.yaml
      - ES_HOST=${ES_HOST:-http://localhost:9200}
      - ES_INDEX=${ES_INDEX:-xml-logs}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - BUFFER_TIMEOUT=${BUFFER_TIMEOUT:-2.0}
      - WORKER_COUNT=${WORKER_COUNT:-4}
      - ENABLE_SPLUNK=false
    volumes:
      - xml-logs:/var/log/xml_data:Z
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    restart: unless-stopped
volumes:
  xml-logs: