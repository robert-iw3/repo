apiVersion: apps/v1
kind: Deployment
metadata:
  name: xml-elasticsearch
  namespace: {{namespace}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: xml-elasticsearch
  template:
    metadata:
      labels:
        app: xml-elasticsearch
    spec:
      containers:
      - name: xml-elasticsearch
        image: xml-connector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: XML_LOG_DIR
          value: "/var/log/xml_data"
        - name: SCHEMAS_FILE
          value: "/app/schemas.yaml"
        - name: ES_HOST
          value: "{{es_host}}"
        - name: ES_INDEX
          value: "{{es_index}}"
        - name: BATCH_SIZE
          value: "{{batch_size}}"
        - name: BUFFER_TIMEOUT
          value: "{{buffer_timeout}}"
        - name: WORKER_COUNT
          value: "{{worker_count}}"
        - name: ENABLE_SPLUNK
          value: "false"
        volumeMounts:
        - name: xml-logs
          mountPath: /var/log/xml_data
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pidof", "python3"]
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["pidof", "python3"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: xml-logs
        persistentVolumeClaim:
          claimName: xml-logs