        log_level: severity
        message: message
        facility: facility
      cim:
        time: timestamp
        event_id: message_id
        host: hostname
        severity: severity
        message: message
        facility: facility
        sourcetype: syslog
  - name: windows_event
    schema_key: log_type
    schema_value: windows_event
    mappings:
      ecs:
        timestamp: timestamp
        event_id: event_id
