schemas:
  - name: simple_event
    schema_key: event_type
    schema_value: network_event
    mappings:
      ecs:
        timestamp: timestamp
        event_id: id
        event_category: category
        source_ip: source/ip
        source_port: source/port
        dest_ip: destination/ip
        dest_port: destination/port
        protocol: protocol
        bytes_sent: bytes_sent
        bytes_received: bytes_received
        action: action
      cim:
        time: timestamp
        event_id: id
        source: source/ip
        src_port: source/port
        dest: destination/ip
        dest_port: destination/port
        protocol: protocol
        bytes_in: bytes_received
        bytes_out: bytes_sent
        action: action
  - name: scada_modbus
    schema_key: event_type
    schema_value: modbus_event
    mappings:
      ecs:
        timestamp: timestamp
        event_id: transaction_id
        event_category: ["network", "industrial"]
        source_ip: client/ip
        source_port: client/port
        dest_ip: server/ip
        dest_port: server/port
        protocol: "modbus"
        function_code: function_code
      cim:
        time: timestamp
        event_id: transaction_id
        source: client/ip
        src_port: client/port
        dest: server/ip
        dest_port: server/port
        protocol: "modbus"
        app: "modbus"
        function_code: function_code
  - name: network_flow
    schema_key: event_type
    schema_value: flow
    mappings:
      ecs:
        timestamp: timestamp
        event_id: flow_id
        event_category: "network"
        source_ip: src/ip
        source_port: src/port
        dest_ip: dst/ip
        dest_port: dst/port
        protocol: proto
        bytes_sent: bytes_out
        bytes_received: bytes_in
        duration: duration_ms
        packets_sent: packets_out
        packets_received: packets_in
      cim:
        time: timestamp
        event_id: flow_id
        source: src/ip
        src_port: src/port
        dest: dst/ip
        dest_port: dst/port
        protocol: proto
        bytes_in: bytes_in
        bytes_out: bytes_out
        duration: duration_ms
        packets: packets_out
