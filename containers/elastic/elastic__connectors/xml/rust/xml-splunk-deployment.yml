apiVersion: apps/v1
kind: Deployment
metadata:
  name: xml-splunk
  namespace: {{namespace}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: xml-splunk
  template:
    metadata:
      labels:
        app: xml-splunk
    spec:
      containers:
      - name: xml-splunk
        image: xml-connector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: XML_LOG_DIR
          value: "/var/log/xml_data"
        - name: SCHEMAS_FILE
          value: "/app/schemas.yaml"
        - name: SPLUNK_ENABLED
          value: "true"
        - name: SPLUNK_HEC_URL
          value: "{{splunk_hec_url}}"
        - name: SPLUNK_TOKEN
          value: "{{splunk_token}}"
        - name: BATCH_SIZE
          value: "{{batch_size}}"
        - name: BUFFER_TIMEOUT
          value: "{{buffer_timeout}}"
        - name: WORKER_COUNT
          value: "{{worker_count}}"
        - name: CONFIG_FILE
          value: "/app/deploy_config.yaml"
        volumeMounts:
        - name: xml-logs
          mountPath: /var/log/xml_data
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pidof", "xml-connector"]
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["pidof", "xml-connector"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: xml-logs
        persistentVolumeClaim:
          claimName: xml-logs