apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-admin
  namespace: elastic
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: elastic-full-access
  namespace: elastic
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elastic-admin-binding
  namespace: elastic
subjects:
  - kind: ServiceAccount
    name: elastic-admin
roleRef:
  kind: Role
  name: elastic-full-access
  apiGroup: rbac.authorization.k8s.io