apm-server:
  host: 0.0.0.0:8200
  secret_token: "${APM_SERVER_TOKEN}"
  ssl.enabled: true
  ssl.certificate: "config/certs/apm-server/apm-server.crt"
  ssl.key: "config/certs/apm-server/apm-server.key"

output.elasticsearch:
  hosts: [ "https://elasticsearch:9200" ]
  username: elastic
  password: "${ELASTIC_PASSWORD}"
  ssl.certificate_authorities: [ "config/certs/ca/ca.crt" ]

kibana:
  enabled: true
  host: [ "https://kibana:5601" ]
  username: elastic
  password: "${ELASTIC_PASSWORD}"
  ssl.enabled: true
  ssl.certificate_authorities: [ "config/certs/ca/ca.crt" ]

monitoring:
  enabled: true