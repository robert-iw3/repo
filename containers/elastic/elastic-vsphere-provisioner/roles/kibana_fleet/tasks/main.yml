---
- name: Tune OS for Elastic (All Distros)
  lineinfile:
    path: /etc/sysctl.conf
    line: "vm.max_map_count = 262144"
    state: present
  become: yes

- name: Increase file descriptors (All Distros)
  copy:
    dest: /etc/security/limits.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535
    mode: '0644'
  become: yes

- name: Disable swap (All Distros)
  command: swapoff -a
  become: yes

- name: Remove swap from fstab
  lineinfile:
    path: /etc/fstab
    regexp: '^.* swap .*'
    state: absent
  become: yes

# === KIBANA (Podman) ===
- name: Deploy Kibana (Podman)
  containers.podman.podman_container:
    name: kibana
    image: "docker.elastic.co/kibana/kibana:{{ elastic_version }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "5601:5601"
    env:
      ELASTICSEARCH_HOSTS: "{{ es_hosts_list }}"
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: "{{ kibana_password }}"
      SERVER_NAME: kibana
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_CERTIFICATE: /certs/kibana/kibana.crt
      SERVER_SSL_KEY: /certs/kibana/kibana.key
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: /certs/ca/ca.crt
      ELASTICSEARCH_SSL_VERIFICATIONMODE: certificate
    volumes:
      - "{{ certs_dir }}:/certs:ro"
    security_opt:
      - no-new-privileges:true
  when: container_runtime == "podman"
  become: yes

