# === FLEET SERVER (Podman) ===
- name: Deploy Fleet Server (Podman)
  containers.podman.podman_container:
    name: fleet-server
    image: "docker.elastic.co/beats/elastic-agent:{{ elastic_version }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "8220:8220"
    env:
      FLEET_ENROLL: "1"
      FLEET_SERVER_ENABLE: "1"
      KIBANA_FLEET_SETUP: "1"
      KIBANA_HOST: "https://{{ inventory_hostname }}:5601"
      FLEET_URL: "https://{{ inventory_hostname }}:8220"
      FLEET_SERVER_ELASTICSEARCH_HOST: "https://{{ groups['elasticsearch'][0] }}:9200"
      KIBANA_FLEET_USERNAME: elastic
      KIBANA_FLEET_PASSWORD: "{{ elastic_password }}"
      FLEET_SERVER_CERT: /certs/fleet-server/fleet-server.crt
      FLEET_SERVER_CERT_KEY: /certs/fleet-server/fleet-server.key
      FLEET_CA: /certs/ca/ca.crt
      FLEET_SERVER_ELASTICSEARCH_CA: /certs/ca/ca.crt
    volumes:
      - "{{ certs_dir }}:/certs:ro"
    security_opt:
      - no-new-privileges:true
  when: container_runtime == "podman"
  become: yes

