---
version: '3.8'

services:
  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - api-gateway
      - certbot  # Ensure certs ready
    networks:
      - sql-net
    restart: unless-stopped

  api-gateway:
    build: .
    deploy:
      replicas: 4
    networks:
      - sql-net

  redis:
    image: redis:7-alpine
    networks:
      - sql-net

  sql1:
    image: mcr.microsoft.com/mssql/server:2025-latest
    networks:
      - sql-net

  sql2:
    image: mcr.microsoft.com/mssql/server:2025-latest
    networks:
      - sql-net

  certbot:
    image: certbot/dns-cloudflare:latest  # Change plugin: e.g., dns-route53, dns-google
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./init-certs.sh:/init-certs.sh:ro  # Mount script
    environment:
      - CLOUDFLARE_EMAIL=your@cloudflare.email  # For Cloudflare plugin
      - CLOUDFLARE_API_TOKEN=your_cloudflare_api_token  # Global token with Zone:DNS:Edit
      # For other providers: e.g., AWS_ACCESS_KEY_ID, GOOGLE_APPLICATION_CREDENTIALS (mount JSON)
    entrypoint: ["/bin/sh", "/init-certs.sh"]
    depends_on:
      - nginx-lb  # Certbot needs NGINX for initial HTTP challenge fallback if no wildcard

volumes:
  redis-data:
  sql1-data:
  sql2-data:

networks:
  sql-net: