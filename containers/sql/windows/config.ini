[Performance]
MaxDop=4
CostThresholdForParallelism=25
OptimizeForAdHocWorkloads=1
BackupCompressionDefault=1
FillFactorPercent=80
NetworkPacketSizeBytes=8192
AffinityMask=0
AffinityIOMask=0
BlockedProcessThresholdSeconds=5
CursorThreshold=-1
LightweightPooling=0
MaxWorkerThreads=0
PriorityBoost=0
RemoteQueryTimeoutSeconds=600
UserConnections=0

[Memory]
MaxMemoryPercent=0.8
MinMemoryPercent=0.2

[Network]
EnableTcp=true
EnableNamedPipes=true
TcpPort=1433

[Services]
SqlServiceAccount=DOMAIN\SqlSvc
SqlServicePassword=SecurePass
AgentServiceAccount=DOMAIN\AgentSvc
AgentServicePassword=SecurePass

[QueryStore]
OperationMode=READ_WRITE
CleanupPolicyDays=30
DataFlushIntervalSeconds=900
MaxStorageSizeMb=2000
IntervalLengthMinutes=60
SizeBasedCleanupMode=AUTO
QueryCaptureMode=ALL
WaitStatsCaptureMode=ON

[Database]
ModelRecoveryModel=FULL
ModelPageVerify=CHECKSUM
ModelCompatibilityLevel=170
ModelAutoCreateStatistics=ON
ModelAutoUpdateStatistics=ON
ModelParameterization=SIMPLE

[Advanced]
DefaultTraceEnabled=1
RemoteAccess=1
EnableOptimizedLocking=true
EnableServerAudit=0
TraceFlags=1118,2371
DefaultLanguage=us_english

[TempDB]
MaxTempFiles=8
TempFileSizeMb=1024
TempFileGrowthMb=512

[Users]
DefaultDbName=MyAppDb
UserConfigs=appuser;AppPass123;bulkadmin;db_owner@MyAppDb;SELECT ON dbo.Table1@MyAppDb,appreader;ReadPass;;db_datareader@MyAppDb;