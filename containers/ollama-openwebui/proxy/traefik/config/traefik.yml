        # used during the challenge
#        entryPoint: web
#  le-prod:
#    acme:
      # certificates will be generate with the production ACME premium account
#      email: enter.your@email.com
#      httpChallenge:
        # used during the challenge
#        entryPoint: web
#      tlsChallenge: {}
log:
  filePath: "/var/log/traefik/traefik.log"
  format: json
  level: INFO
accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  filters:
    statusCodes:
      - "204-299"
      - "400-499"
      - "500-599"
    retryAttempts: true
    minDuration: "10ms"
