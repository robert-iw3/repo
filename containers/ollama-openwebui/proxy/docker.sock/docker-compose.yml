---
services:
  docker-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-proxy
    user: root
    volumes:
      #- $XDG_RUNTIME_DIR/podman/podman.sock:/var/run/docker.sock:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:2375:2375"