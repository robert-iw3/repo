global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'nifi'
    static_configs:
      - targets: ['nifi.example.com:8443']
    metrics_path: /nifi-metrics
    scheme: https
  - job_name: 'nifi-registry'
    static_configs:
      - targets: ['nifi.example.com:18080']
    metrics_path: /nifi-registry-metrics
    scheme: https
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']