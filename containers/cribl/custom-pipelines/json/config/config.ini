[cribl]
host = https://your-cribl-instance.example.com
user = admin
pass = password

[json]
dir = ./json_files
file_filter = *.json
tracking_field = modtime
pipeline_id = my_json_pipeline
pipeline_group = local
source_tag = json_files
aggregate_interval = 1m
sample_rate = 0.5
limit_max_events = 100000
error_output = error_destination
main_output = main_destination
pipeline_variant = logs

[splunk]
hec_url = https://your-splunk-hec.example.com/services/collector/event
hec_token = your-hec-token
destination_id = splunk_hec_dest