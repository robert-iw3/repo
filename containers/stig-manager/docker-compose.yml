version: '3.8'

services:
  db:
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=8G --sort_buffer_size=16M --require_secure_transport=ON
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: stigman
      MYSQL_USER: stigman
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stigmanpass}
    volumes:
      - db_data:/var/lib/mysql
      - ./certs/db-ca.pem:/etc/mysql/ssl/ca.pem:ro
      - ./certs/db-server.pem:/etc/mysql/ssl/server-cert.pem:ro
      - ./certs/db-server.key:/etc/mysql/ssl/server-key.pem:ro
    networks:
      - stigman-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    cap_add:
      - SYS_NICE

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    command: start --optimized
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://db:3306/keycloak?useSSL=true&requireSSL=true&trustServerCertificate=true
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloakpass}
      KC_HOSTNAME: ${DOMAIN:-localhost}
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_ENABLED: "true"
      KC_HTTPS_PORT: 8443
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/server.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/server.key
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-adminpass}
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./certs/server.crt:/opt/keycloak/conf/server.crt:ro
      - ./certs/server.key:/opt/keycloak/conf/server.key:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8443:8443"
    networks:
      - stigman-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  stigman-api:
    image: nuwcdivnpt/stig-manager:latest
    restart: always
    environment:
      STIGMAN_DB_HOST: db
      STIGMAN_DB_PORT: 3306
      STIGMAN_DB_USER: stigman
      STIGMAN_DB_PASSWORD: ${MYSQL_PASSWORD:-stigmanpass}
      STIGMAN_DB_TLS_CA_FILE: /certs/db-ca.pem
      STIGMAN_DB_TLS_CERT_FILE: /certs/db-client-cert.pem
      STIGMAN_DB_TLS_KEY_FILE: /certs/db-client-key.pem
      STIGMAN_DB_TLS_REQUIRE: true
      STIGMAN_OIDC_PROVIDER: https://keycloak:8443/realms/stigman
      STIGMAN_CLIENT_OIDC_PROVIDER: https://${DOMAIN:-localhost}/realms/stigman
      STIGMAN_API_ADDRESS: 0.0.0.0
      STIGMAN_API_PORT: 54000
      STIGMAN_CLASSIFICATION: UNCLASSIFIED
      STIGMAN_CLIENT_ADMIN_TIMEOUT: 30
      STIGMAN_CLIENT_USER_TIMEOUT: 15
      STIGMAN_SWAGGER_ENABLED: false
      STIGMAN_LOG_LEVEL: 2
      NODE_EXTRA_CA_CERTS: /certs/extra-ca.pem
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - db
      - keycloak
    networks:
      - stigman-net
    init: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  stigman-watcher:
    image: node:lts-alpine
    command: ["stigman-watcher", "--api", "https://nginx:443/api", "--authority", "https://nginx:443/realms/stigman", "--client-id", "${WATCHER_CLIENT_ID:-stigman-watcher}", "--client-key", "/certs/watcher.pem", "--collection", "${COLLECTION_ID:-1}", "--path", "/watched", "--recursive", "--log-level", "info"]
    restart: always
    environment:
      WATCHER_CLIENT_KEY_PASSPHRASE: ""
      NODE_EXTRA_CA_CERTS: /certs/extra-ca.pem
    volumes:
      - ./certs:/certs:ro
      - ./watched:/watched
    depends_on:
      - nginx
      - keycloak
    networks:
      - stigman-net
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - stigman-api
      - keycloak
    networks:
      - stigman-net

  sftp:
    build: .
    restart: always
    ports:
      - "22:22"
    environment:
      SFTP_USER: ${SFTP_USER:-sftpuser}
      SFTP_PASSWORD: ${SFTP_PASSWORD:-sftppass}
      SFTP_CHROOT_DIR: /upload
    volumes:
      - ./watched:/upload  # Drops files to watcher's path
    networks:
      - stigman-net

volumes:
  db_data:
  keycloak_data:

networks:
  stigman-net:
    driver: bridge
    internal: true