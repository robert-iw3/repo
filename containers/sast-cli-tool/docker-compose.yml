---
services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=analyzer
      - DB_USER=analyzer
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
      - ./test_project:/app/test_project
      - ./config.yaml:/app/config.yaml
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - analyzer-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - analyzer-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    volumes:
      - ./web/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
      - ./letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - analyzer-network

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=analyzer
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=analyzer
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analyzer-network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'
    depends_on:
      - web
    networks:
      - analyzer-network

volumes:
  db-data:

networks:
  analyzer-network:
    driver: bridge