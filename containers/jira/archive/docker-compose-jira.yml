version: '3'

volumes:
  jira-data:
  jira-data-backups:
  jira-postgres-backups:
  traefik-certificates:

networks:
  jira:
    name: jira
    driver: bridge

services:
  jira:
    image: docker.io/atlassian/jira-software:latest
    container_name: jira
    hostname: jira.io
    volumes:
      - jira-data:/var/atlassian/application-data/jira
    ports:
      - "8100:8080"
    environment:
      JVM_MINIMUM_MEMORY: 8G
      JVM_MAXIMUM_MEMORY: 8G
      ATL_PROXY_NAME: jira-proxy.io
      ATL_PROXY_PORT: 443
      ATL_TOMCAT_SCHEME: https
      ATL_TOMCAT_SECURE: 'true'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jira.rule=Host(`jira.io`)"
      - "traefik.http.routers.jira.service=jira"
      - "traefik.http.routers.jira.entrypoints=websecure"
      - "traefik.http.services.jira.loadbalancer.server.port=8100"
      - "traefik.http.routers.jira.tls=true"
      - "traefik.http.routers.jira.tls.certresolver=letsencrypt"
      - "traefik.http.services.jira.loadbalancer.passhostheader=true"
      - "traefik.http.routers.jira.middlewares=compresstraefik"
      - "traefik.http.middlewares.compresstraefik.compress=true"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - jira

  traefik:
    image: docker.io/traefik:latest
    container_name: traefik
    hostname: traefik.io
    command:
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--ping=true"
      - "--ping.entrypoint=ping"
      - "--entryPoints.ping.address=:8082"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedByDefault=false"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=enter@email.here"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      - "--global.checkNewVersion=true"
      - "--global.sendAnonymousUsage=false"
    volumes:
      - /run/user/${UID}/podman/podman.sock:/var/run/docker.sock:ro
      - traefik-certificates:/etc/traefik/acme
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "http://localhost:8082/ping","--spider"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.io`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.passhostheader=true"
      - "traefik.http.routers.dashboard.middlewares=authtraefik"
      # Passwords must be encoded using MD5, SHA1, or BCrypt
      - "traefik.http.middlewares.authtraefik.basicauth.users=traefikadmin:$$enter$$hashed$$passhere"
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    restart: unless-stopped
    networks:
      - jira

  backups:
    image: docker.io/bitnami/postgresql:latest
    container_name: psql-backup
    hostname: jira-backup-psql.io
    command: sh -c 'sleep 30m
             && while true; do
             PGPASSWORD="$$(echo $$JIRA_DB_PASS)"
             pg_dump
             -h postgres-jira.io
             -p 5432
             -d jira
             -U jira | gzip > /srv/jira-postgres/backups/jira-postgres-backup-$$(date "+%Y-%m-%d_%H-%M").gz
             && tar -zcpf /srv/jira-application-data/backups/jira-application-data-backup-$$(date "+%Y-%m-%d_%H-%M").tar.gz /var/atlassian/application-data/jira
             && find /srv/jira-postgres/backups -type f -mtime +7 | xargs rm -f
             && find /srv/jira-application-data/backups -type f -mtime +7 | xargs rm -f;
             sleep 24h; done'
    volumes:
      - jira-data:/var/atlassian/application-data/jira
      - jira-data-backups:/srv/jira-application-data/backups
      - jira-postgres-backups:/srv/jira-postgres/backups
    environment:
      POSTGRES_PASSWORD: ${PSQL_BACKUP_PASS}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      jira:
        condition: service_healthy
    networks:
      - jira
