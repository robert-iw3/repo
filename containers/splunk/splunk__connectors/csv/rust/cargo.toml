[package]
name = "csv-connector"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
notify = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
csv = "1"
reqwest = { version = "0.11", features = ["json"] }
dotenv = "0.15"
num_cpus = "1"
chrono = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1