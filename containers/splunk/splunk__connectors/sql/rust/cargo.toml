[package]
name = "sql-connector"
version = "0.2.0"
edition = "mvp"

[dependencies]
tokio = { version = "1", features = ["full", "signal"] }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "any", "postgres", "mysql", "mssql", "sqlite", "oracle", "chrono", "uuid"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
reqwest = { version = "0.11", features = ["json"] }
dotenv = "0.15"
num_cpus = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
thiserror = "1"
tokio-retry = "0.3"
sled = "0.34"
bincode = "1"
prometheus = "0.13"
warp = "0.3"  # For metrics endpoint
postgres-protocol = "0.6"  # For PostgreSQL CDC
postgres-types = { version = "0.2", features = ["derive"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1