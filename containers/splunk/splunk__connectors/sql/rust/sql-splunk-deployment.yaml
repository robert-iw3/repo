apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-splunk
  namespace: {{namespace}}
spec:
  replicas: {{replicas}}
  selector:
    matchLabels:
      app: sql-splunk
  template:
    metadata:
      labels:
        app: sql-splunk
    spec:
      containers:
      - name: sql-splunk
        image: sql-connector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: SCHEMAS_FILE
          value: "/app/schemas.yaml"
        - name: STATE_PATH
          value: "/app/state.db"
        - name: SPLUNK_HEC_URL
          value: "{{splunk_hec_url}}"
        - name: SPLUNK_TOKEN
          value: "{{splunk_token}}"
        - name: BATCH_SIZE
          value: "{{batch_size}}"
        - name: BUFFER_TIMEOUT
          value: "{{buffer_timeout}}"
        - name: WORKER_COUNT
          value: "{{worker_count}}"
        - name: POLL_INTERVAL
          value: "{{poll_interval}}"
        - name: DB_TYPE
          value: "{{db_type}}"
        - name: DB_CONN_STR
          value: "{{db_conn_str}}"
        - name: CDC_ENABLED
          value: "{{cdc_enabled}}"
        - name: MAX_CONNECTIONS_PER_TABLE
          value: "{{max_connections_per_table}}"
        - name: METRICS_PORT
          value: "{{metrics_port}}"
        - name: ENABLE_SPLUNK
          value: "true"
        - name: RUST_LOG
          value: "info"
        ports:
        - containerPort: {{metrics_port}}
          name: metrics
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["pidof", "sql-connector"]
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["pidof", "sql-connector"]
          initialDelaySeconds: 10
          periodSeconds: 10