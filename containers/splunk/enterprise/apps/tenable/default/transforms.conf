[set_sourcetype_pvs]
REGEX = pvs:
FORMAT = sourcetype::tenable:nnm:vuln
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_nnm]
REGEX = nnm:
FORMAT = sourcetype::tenable:nnm:vuln
DEST_KEY = MetaData:Sourcetype

[protocol_lookup]
filename = protocols.csv
max_matches = 1
min_matches = 1
default_match = unknown

[tenable_severity_lookup]
filename = tenable_severity.csv
case_sensitive_match=false

[nnm_fields_lookup]
filename = tenable_nnm_fields.csv

[port_lookup]
filename = services.csv
max_matches = 1
min_matches = 1
default_match = unknown

[orig_action_name_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*orig_action_name=\"([^"]+)
FORMAT   = $0 orig_action_name::$1
DEST_KEY = _meta

[orig_sid_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*orig_sid=\"([^"]+)
FORMAT   = $0 orig_sid::$1
DEST_KEY = _meta

[orig_rid_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*orig_rid=\"([^"]+)
FORMAT   = $0 orig_rid::$1
DEST_KEY = _meta

[sourcetype_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*sourcetype=\"([^"]+)
FORMAT   = sourcetype::$1
DEST_KEY = MetaData:Sourcetype

[sinkhole_cam_header]
REGEX     = (?s)^\*{3}Common\sAction\sModel\*{3}[^\n]+\n(.*)
FORMAT    = $1
DEST_KEY  = _raw
## Do not truncate _raw to 4096!
LOOKAHEAD = -1

[auto_kv_tenable_ot]
REGEX = ([\d+\w+]+)=(.*?(?=\S+=)|\S*(?=\")|\S*)?
FORMAT = $1::$2
REPEAT_MATCH = true
MV_ADD = 1

[alsid_ad_object_kv]
FORMAT = $1::$2
REGEX = ([^"]*?)=([^"]*?)[,"]
MV_ADD = true
REPEAT_MATCH = true
SOURCE_KEY = ad_object

[alsid_insertion_string_kv]
REGEX = "([^"]*?)"="([^"]*?)"
FORMAT = $1::$2
MV_ADD = true
REPEAT_MATCH = true

[lookup_alsid_internal_mtype]
filename = lookup_alsid_internal_mtype.csv
