---
apiVersion: v1
kind: Namespace
metadata:
  name: scylla
---
apiVersion: v1
kind: Secret
metadata:
  name: scylla-secret
  namespace: scylla
type: Opaque
data:
  root-password: <base64-encoded-password>  # e.g., `echo -n 'changeme' | base64`
  tls-cert: <base64-encoded-scylla.pem>
  tls-ca: <base64-encoded-ca.pem>
  tls-cluster: <base64-encoded-scylla-cluster.pem>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scylla-tenant-init
  namespace: scylla
data:
  tenant-init.cql: |
    -- Initialize tenant keyspaces
    -- Generated by deploy_scylladb.py based on user_config.yaml
---
apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: scylla-cluster
  namespace: scylla
spec:
  version: 5.4
  repository: scylladb/scylla-enterprise
  datacenter:
    name: dc1
    racks:
    - name: rack0
      members: 3
      storage:
        capacity: 100Gi
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
        limits:
          cpu: "8"
          memory: "12Gi"
      scyllaConfig:
        smp: 8
        memory: 12G
        authenticator: PasswordAuthenticator
        authorizer: CassandraAuthorizer
    - name: rack1
      members: 3
      storage:
        capacity: 100Gi
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
        limits:
          cpu: "8"
          memory: "12Gi"
      scyllaConfig:
        smp: 8
        memory: 12G
        authenticator: PasswordAuthenticator
        authorizer: CassandraAuthorizer
  securityContext:
    runAsUser: 999
    runAsGroup: 999
  sysctl:
  - fs.aio-max-nr=2097152
  initContainers:
  - name: tenant-init
    image: scylladb/scylla-enterprise:5.4
    command: ["/bin/sh", "-c", "cqlsh --ssl -u $SCYLLA_ROOT_USERNAME -p $SCYLLA_ROOT_PASSWORD -f /docker-entrypoint-initdb.d/tenant-init.cql"]
    env:
    - name: SCYLLA_ROOT_USERNAME
      value: admin
    - name: SCYLLA_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-secret
          key: root-password
    volumeMounts:
    - name: initdb
      mountPath: /docker-entrypoint-initdb.d
  volumes:
  - name: initdb
    configMap:
      name: scylla-tenant-init
      items:
      - key: tenant-init.cql
        path: tenant-init.cql
  - name: tls
    secret:
      secretName: scylla-secret
      items:
      - key: tls-cert
        path: scylla.pem
      - key: tls-ca
        path: ca.pem
      - key: tls-cluster
        path: scylla-cluster.pem
  networkPolicy:
    enabled: true
    ingress:
    - ports:
      - port: 9042
      - port: 9142
      - port: 7001
      - port: 10001
  enterprise:
    auditLog:
      enabled: true
      categories: [AUTH, DDL]
      output: files:/var/log/scylla/audit
---
apiVersion: v1
kind: Service
metadata:
  name: scylla-cluster
  namespace: scylla
spec:
  ports:
  - port: 9042
    targetPort: 9042
    name: cql
  - port: 9142
    targetPort: 9142
    name: cql-ssl
  - port: 10001
    targetPort: 10001
    name: manager
  - port: 7001
    targetPort: 7001
    name: internode
  selector:
    scylla/cluster: scylla-cluster
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scylla-cluster-hpa
  namespace: scylla
spec:
  scaleTargetRef:
    apiVersion: scylla.scylladb.com/v1
    kind: ScyllaCluster
    name: scylla-cluster
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: scylla-manager
  namespace: scylla
spec:
  ports:
  - port: 10001
    targetPort: 10001
    name: manager
  selector:
    scylla/cluster: scylla-cluster