name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    - name: Lint
      run: black --check .
    - name: Test with pytest
      run: pytest tests/ --cov=chains --cov-report=xml
    - name: Upload coverage
      uses: codecov/codecov-action@v4

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to K8s
      run: |
        # Assume kubectl configured via secrets
        python deploy.py --orchestrator kubernetes --env-file .env
      env:
        IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}