---
- name: Ensure pdf_bot Dockerfile exists
  copy:
    src: "{{ project_dir }}/pdf_bot.Dockerfile"
    dest: "{{ project_dir }}/pdf_bot.Dockerfile"
    mode: "0644"
  when: orchestrator in ['docker', 'podman']

- name: Ensure pdf_bot files exist
  copy:
    src: "{{ project_dir }}/{{ item }}"
    dest: "{{ project_dir }}/{{ item }}"
    mode: "0644"
  loop: "{{ python_services | selectattr('name', 'equalto', 'pdf_bot') | first | attr('service_files') }}"
  when: orchestrator in ['docker', 'podman']