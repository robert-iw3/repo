---
- name: Deploy Consul Cluster
  hosts: localhost
  become: true
  vars_files:
    - vars/consul.yml
  tasks:
    - name: Install required packages
      package:
        name:
          - python3-pip
          - git
          - consul
        state: present

    - name: Install Python dependencies
      pip:
        name:
          - kubernetes
          - pyyaml
        state: present

    - name: Create certs directory
      file:
        path: "{{ consul_certs_dir }}"
        state: directory
        mode: '0755'

    - name: Create config directory
      file:
        path: "{{ consul_config_dir }}"
        state: directory
        mode: '0755'

    - name: Copy certificate generation script
      copy:
        src: "{{ playbook_dir }}/config/generate_certs.py"
        dest: "{{ consul_config_dir }}/generate_certs.py"
        mode: '0755'

    - name: Deploy Consul with Docker
      when: consul_runtime == "docker"
      block:
        - name: Ensure Docker is installed
          package:
            name: docker
            state: present

        - name: Ensure Docker Compose plugin is installed
          package:
            name: docker-compose
            state: present

        - name: Start Docker service
          service:
            name: docker
            state: started
            enabled: true

        - name: Deploy Docker Compose configuration
          command: "docker compose -f {{ consul_compose_file }} up -d"
          args:
            chdir: "{{ playbook_dir }}"
          register: docker_deploy
          changed_when: docker_deploy.rc == 0

        - name: Wait for Consul containers to be running
          command: "docker compose -f {{ consul_compose_file }} ps -q"
          args:
            chdir: "{{ playbook_dir }}"
          register: docker_ps
          until: docker_ps.stdout.strip() != ""
          retries: 30
          delay: 10

    - name: Deploy Consul with Podman
      when: consul_runtime == "podman"
      block:
        - name: Ensure Podman is installed
          package:
            name: podman
            state: present

        - name: Ensure Podman Compose is installed
          pip:
            name: podman-compose
            state: present

        - name: Deploy Podman Compose configuration
          command: "podman-compose -f {{ consul_compose_file }} up -d"
          args:
            chdir: "{{ playbook_dir }}"
          register: podman_deploy
          changed_when: podman_deploy.rc == 0

        - name: Wait for Consul containers to be running
          command: "podman-compose -f {{ consul_compose_file }} ps -q"
          args:
            chdir: "{{ playbook_dir }}"
          register: podman_ps
          until: podman_ps.stdout.strip() != ""
          retries: 30
          delay: 10

    - name: Deploy Consul with Kubernetes
      when: consul_runtime == "kubernetes"
      block:
        - name: Ensure kubectl is installed
          package:
            name: kubectl
            state: present

        - name: Create Kubernetes namespace
          kubernetes.core.k8s:
            api_version: v1
            kind: Namespace
            name: "{{ consul_namespace }}"
            state: present

        - name: Create Consul gossip secret
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: consul-gossip-key
                namespace: "{{ consul_namespace }}"
              stringData:
                gossip-encryption-key: "{{ consul_encrypt_key }}"

        - name: Apply Kubernetes manifest
          kubernetes.core.k8s:
            state: present
            src: "{{ consul_kubernetes_manifest }}"
            namespace: "{{ consul_namespace }}"

        - name: Wait for Consul pods to be running
          kubernetes.core.k8s_info:
            kind: Pod
            namespace: "{{ consul_namespace }}"
            label_selectors:
              - app=consul
          register: pod_status
          until: pod_status.resources | length > 0 and pod_status.resources | selectattr('status.phase', 'equal', 'Running') | length == pod_status.resources | length
          retries: 30
          delay: 10

    - name: Verify Consul UI accessibility
      uri:
        url: "https://localhost:8501/v1/health/service/consul"
        validate_certs: false
        status_code: 200
      register: consul_ui
      retries: 30
      delay: 10
      until: consul_ui.status == 200