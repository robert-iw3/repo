apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opencti-network-policy
  namespace: opencti
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: opencti
    - podSelector:
        matchLabels:
          app: worker
    - podSelector:
        matchLabels:
          app: connector-export-file-stix  # Add all connectors as needed
    ports:
    - protocol: TCP
      port: 8080  # Adjust ports as needed
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis
    - podSelector:
        matchLabels:
          app: elasticsearch
    - podSelector:
        matchLabels:
          app: minio
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9200
    - protocol: TCP
      port: 9000
    - protocol: TCP
      port: 5672
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencti-ingress
  namespace: opencti
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: opencti.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opencti
            port:
              number: 8080
  tls:
  - hosts:
    - opencti.example.com
    secretName: opencti-tls  # Assume a TLS secret is created