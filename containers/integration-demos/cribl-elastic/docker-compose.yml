---
# quick demo, not a fully fledged stack - just something to get your bearings
networks:
  elastic:
    driver: bridge

x-common-vars-apps: &common-vars-apps
  networks: ['elastic']
  security_opt: ['no-new-privileges:true']
  restart: on-failure
  env_file: ['.env']

services:

  cribl:
    <<: *common-vars-apps
    image: docker.io/cribl/cribl:latest
    user: 999:999
    environment:
      - CRIBL_MODE=single
      - CRIBL_VOLUME_DIR=/opt/cribl/config-volume
    volumes:
      - ./cribl/config:/opt/cribl/config-volume:Z
      - ./cribl/data:/opt/cribl/data:Z
      - $XDG_RUNTIME_DIR/podman/podman.sock:/var/run/docker.sock
    ports:
      - 9000:9000
      - 19200:19200

  elasticsearch:
    <<: *common-vars-apps
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    container_name: elasticsearch
    ports:
      - 9200:9200
    environment:
      - node.name=elasticsearch
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ES_ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --max-time 1 -s http://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      start_period: 10s
      interval: 1s
      timeout: 10s
      retries: 120

  bootstrap:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    container_name: bootstrap
    restart: 'no'
    command: >
      bash -c '
        echo "Setup the kibana_system password";
        until curl --max-time 1 -s -u "elastic:${ES_ELASTIC_PASSWORD}" \
          -X POST http://elasticsearch:9200/_security/user/kibana_system/_password \
          -d "{\"password\":\"${KIBANA_PASSWORD}\"}" \
          -H "Content-Type: application/json" | grep -q "^{}"; do sleep 5; done;
      '

  kibana:
    <<: *common-vars-apps
    image: docker.elastic.co/kibana/kibana:9.0.3
    container_name: kibana
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    ports:
      - 5601:5601
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - MONITORING_UI_CONTAINER_ELASTICSEARCH_ENABLED=true
      - XPACK_SECURITY_ENCRYPTIONKEY=${XPACK_SECURITY_ENCRYPTIONKEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY}
      - SERVER_PUBLICBASEURL=http://127.0.0.1:5601
    healthcheck:
      test: ["CMD-SHELL", "curl --max-time 1 -s http://localhost:5601/api/status | grep -q 'available'"]
      retries: 300
      interval: 1s