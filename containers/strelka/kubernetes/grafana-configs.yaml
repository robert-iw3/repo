apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      jsonData:
        timeInterval: 30s
    - name: Elasticsearch  # For Suricata logs if using
      type: elasticsearch
      access: proxy
      url: http://elasticsearch:9200  # Assume ELK deployed; adjust
      database: "[suricata-*]"  # Index pattern
      jsonData:
        timeField: "@timestamp"
        esVersion: 7
        intervalMs: 1000
        maxConcurrentShardRequests: 5

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
data:
  providers.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      options:
        path: /var/lib/grafana/dashboards