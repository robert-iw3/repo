apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        ports:
        - containerPort: 9090
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}  # Or PVC for persistence
      securityContext:
        runAsUser: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: 'redis'
      static_configs:
      - targets: ['redis-exporter:9121']
    - job_name: 'minio'
      static_configs:
      - targets: ['filestore:9000']
      metrics_path: /minio/v2/metrics/cluster
    - job_name: 'strelka-frontend'
      static_configs:
      - targets: ['frontend:8732']  # gRPC; use blackbox for probe
    - job_name: 'suricata'
      static_configs:
      - targets: ['suricata-exporter:9913']

---
# ServiceMonitor for Prometheus Operator (if using Operator; otherwise use annotations)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: redis
  endpoints:
  - port: 9121  # Exporter port

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: filestore
  endpoints:
  - port: 9000
    path: /minio/v2/metrics/cluster

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: strelka-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: frontend  # Or backend
  endpoints:
  - port: 8732  # Customize for metrics if exposed

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: suricata-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: suricata
  endpoints:
  - port: 9913