providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    watch: true
    exposedByDefault: false
    swarmMode: false
    network: falco
  file:
    directory: /dynamic
    watch: true
log:
  filePath: "/var/log/traefik/falco/traefik.log"
  format: json
  level: INFO
accessLog:
  filePath: "/var/log/traefik/falco/access.log"
  format: json
  filters:
    statusCodes:
      - "204-299"
      - "400-499"
      - "500-599"
    retryAttempts: true
    minDuration: "10ms"