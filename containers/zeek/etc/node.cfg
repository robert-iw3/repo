# ZeekControl node configuration
# Dynamically generated or customized via deploy_zeek.py

[zeek]
type=standalone
host=localhost
interface=${ZEEK_INTERFACE:-eth0}
lb_method=custom
lb_procs=${ZEEK_WORKER_PROCESSES:-4}
af_packet_fanout_id=23
af_packet_fanout_mode=AF_Packet::FANOUT_HASH
af_packet_buffer_size=${ZEEK_BUFFER_SIZE:-134217728}  # 128MB default