apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: hanko
  labels:
    app: postgresql
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: hanko-secrets
  namespace: hanko
type: Opaque
data:
  db_username: {{ .Values.vault.enabled | ternary (printf "{{ vault_secret('%s', 'db_username') | b64enc }}" .Values.vault.secretPath) (.Values.db.username | b64enc) }}
  db_password: {{ .Values.vault.enabled | ternary (printf "{{ vault_secret('%s', 'db_password') | b64enc }}" .Values.vault.secretPath) (.Values.db.password | b64enc) }}
  repl_user: {{ .Values.vault.enabled | ternary (printf "{{ vault_secret('%s', 'repl_user') | b64enc }}" .Values.vault.secretPath) (.Values.db.repl_user | b64enc) }}
  repl_password: {{ .Values.vault.enabled | ternary (printf "{{ vault_secret('%s', 'repl_password') | b64enc }}" .Values.vault.secretPath) (.Values.db.repl_password | b64enc) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: hanko
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: docker.io/bitnami/postgresql:16
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: POSTGRESQL_REPLICATION_MODE
              value: master
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hanko-secrets
                  key: db_username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hanko-secrets
                  key: db_password
            - name: POSTGRESQL_DATABASE
              value: hanko
            - name: POSTGRESQL_REPLICATION_USER
              valueFrom:
                secretKeyRef:
                  name: hanko-secrets
                  key: repl_user
            - name: POSTGRESQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hanko-secrets
                  key: repl_password
            - name: POSTGRESQL_SSL
              value: "on"
            - name: POSTGRESQL_SSL_CERT_FILE
              value: /etc/postgresql/tls/tls.crt
            - name: POSTGRESQL_SSL_KEY_FILE
              value: /etc/postgresql/tls/tls.key
            - name: POSTGRESQL_SSL_CA_FILE
              value: /etc/postgresql/tls/ca.crt
          volumeMounts:
            - name: postgres-data
              mountPath: /bitnami/postgresql
            - name: tls-certs
              mountPath: /etc/postgresql/tls
              readOnly: true
          resources:
            limits:
              cpu: 1000m
              memory: 2048Mi
            requests:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command: ["pg_isready", "-d", "hanko", "-U", "hanko_user"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-d", "hanko", "-U", "hanko_user"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: tls-certs
          secret:
            secretName: hanko-tls
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: hanko
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: standard