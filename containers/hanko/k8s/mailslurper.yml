apiVersion: v1
kind: Service
metadata:
  name: mailslurper
  namespace: hanko
  labels:
    app: mailslurper
spec:
  ports:
    - name: web
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: smtp
      port: 2500
      targetPort: 8085
      protocol: TCP
  selector:
    app: mailslurper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailslurper
  namespace: hanko
  labels:
    app: mailslurper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailslurper
  template:
    metadata:
      labels:
        app: mailslurper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mailslurper
          image: marcopas/docker-mailslurper:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          ports:
            - containerPort: 8080
              name: web
            - containerPort: 8085
              name: smtp
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3