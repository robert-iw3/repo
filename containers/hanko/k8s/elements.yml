apiVersion: v1
kind: Service
metadata:
  name: elements
  namespace: hanko
  labels:
    app: elements
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: elements
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elements
  namespace: hanko
  labels:
    app: elements
spec:
  replicas: 2
  selector:
    matchLabels:
      app: elements
  template:
    metadata:
      labels:
        app: elements
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: elements
          image: ${CONTAINER_REGISTRY}/hanko-frontend:${TAG:-latest}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: elements
                topologyKey: kubernetes.io/hostname